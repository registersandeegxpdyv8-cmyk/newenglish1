. What was so funny about the\nwords on the sign?\n听录音,然后回答问题。牌子上的字有什么可笑的地方?\nI live in a very old town which is surrounded by beautiful woods. It is a\nfamous beauty spot. On Sundays, hundreds of people come from the city to\nsee our town and to walk through the woods. Visitors have been asked to\nkeep the woods clean and tidy. Litter baskets have been placed under the\ntrees, but people still throw their rubbish everywhere. Last Wednesday, I\nwent for a walk in the woods. What I saw made me very sad. I counted\nseven old cars and three old refrigerators. The little baskets were empty and\nthe ground was covered with pieces of paper, cigarette ends, old tyres,\nempty bottles and rusty tins. Among the rubbish, I found a sign which said,\n'Anyone who leaves litter in these woods will be prosecuted!'","grammarPoint":"现在完成时：have/has + 过去分词，表达已经发生并影响现在的动作。\n一般过去时：动词过去式，讲述过去发生的事情。\n一般将来时：will/shall 或 be going to，表达计划和将来动作。","words":[{"en":"surround","phonetic":"sə'raund","pos":"v","cn":"包围"},{"en":"wood","phonetic":"wud","pos":"n","cn":"树林"},{"en":"beauty spot ⻛","phonetic":"","pos":"","cn":"景点"},{"en":"hundred","phonetic":"'hʌndrid","pos":"n","cn":"百"},{"en":"city","phonetic":"'siti","pos":"n","cn":"城市"},{"en":"through","phonetic":"θru:","pos":"prep","cn":"穿过"},{"en":"visitor","phonetic":"'vizitə","pos":"n","cn":"参观者,游客,来访者"},{"en":"tidy","phonetic":"'taidi","pos":"a","cn":"整⻬的"},{"en":"litter","phonetic":"'litə","pos":"n","cn":"杂乱的东⻄"},{"en":"litter basket","phonetic":"","pos":"","cn":"废物筐"},{"en":"place","phonetic":"pleis","pos":"v","cn":"放"},{"en":"throw","phonetic":"θrəu","pos":"v","cn":"扔,抛"},{"en":"rubbish","phonetic":"'rʌbiʃ","pos":"n","cn":"垃圾"},{"en":"count","phonetic":"kaunt","pos":"v","cn":"数,点"},{"en":"cover","phonetic":"'kʌvə","pos":"v","cn":"覆盖"},{"en":"piece","phonetic":"pi:s","pos":"n","cn":"碎片"},{"en":"tyre","phonetic":"'taiə","pos":"n","cn":"轮胎"},{"en":"rusty","phonetic":"'rʌsti","pos":"a","cn":"生锈的"},{"en":"among","phonetic":"ə'mʌŋ","pos":"prep","cn":"在 ... 之间"},{"en":"prosecute","phonetic":"'prɔsikju:t","pos":"v","cn":"依法处置"}],"grammar":[{"prompt":"语法点：现在完成时：have/has + 过去分词，表达已经发生并影响现在的动作。\n仿写 3 个句子，尽量替换主语、物品或地点。","example":"I have just finished my homework. / Have you ever been to Paris?","answer":"","user":""},{"prompt":"把本课一个肯定句改成否定句，再改成一般疑问句。","example":"This is your handbag. -> This is not your handbag. -> Is this your handbag?","answer":"","user":""},{"prompt":"用本课单词写 2 组问答，回答要完整。","example":"Whose handbag is it? It is my handbag.","answer":"","user":""},{"prompt":"中译英：自己写一个包含本课语法点的中文句子，并翻译成英文。","example":"这是你的手提包吗？ -> Is this your handbag?","answer":"","user":""}],"review":{"words":false,"spell":false,"text":false,"grammar":false},"lastScore":null},{"id":144,"title":"Lesson 144","text":"","grammarPoint":"本课为句型操练课，重点巩固：被动语态和警示语初步；公共规则和环保表达。","words":[],"grammar":[{"prompt":"知识点：被动语态和警示语初步；公共规则和环保表达。\n仿写 5 组替换句，保持句型不变，只替换主语、物品、地点或形容词。","example":"This is my book. -> Is this your book? -> No, it isn't.","answer":"","user":""},{"prompt":"把 3 个肯定句分别改成否定句和一般疑问句，并写出 Yes/No 回答。","example":"This is my pen. -> This is not my pen. -> Is this your pen? Yes, it is.","answer":"","user":""},{"prompt":"用本课单词写 3 组短问答，要求至少包含一个代词、一个 be 动词或助动词。","example":"Is this your book? No, it isn't. It is my teacher's book.","answer":"","user":""},{"prompt":"中译英：围绕本课语法点写 3 个中文句子，再翻译成英文。","example":"这是一辆小汽车吗？ -> Is this a car?","answer":"","user":""},{"prompt":"错句改正：自己故意写 3 个含本课语法错误的英文句子，然后改正。","example":"Is this your books? -> Are these your books?","answer":"","user":""}],"review":{"words":false,"spell":false,"text":false,"grammar":false},"lastScore":null}];

    let lessons = loadData();
    let currentId = 1;
    let activeTab = "read";

    const $ = (id) => document.getElementById(id);

    function defaultGrammar(id) {
      return [
        { prompt: `第 ${id} 课仿写句：把本课一个核心句型换词造句。`, answer: "", user: "" },
        { prompt: `第 ${id} 课转换题：把一个陈述句改成疑问句或否定句。`, answer: "", user: "" },
        { prompt: `第 ${id} 课翻译题：用本课语法翻译一个中文句子。`, answer: "", user: "" }
      ];
    }

    function loadData() {
      const baseLessons = builtInLessons.length ? builtInLessons : initialLessons;
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (!raw) return baseLessons;
        const parsed = JSON.parse(raw);
        return baseLessons.map((base) => mergeSavedLesson(base, parsed.find((item) => item.id === base.id)));
      } catch {
        return baseLessons;
      }
    }

    function mergeSavedLesson(base, saved) {
      if (!saved) return base;
      const merged = { ...base, ...saved };
      if (!saved.title || saved.title === `Lesson ${base.id}`) merged.title = base.title;
      if (!saved.text && base.text) merged.text = base.text;
      if (!saved.grammarPoint && base.grammarPoint) merged.grammarPoint = base.grammarPoint;
      if ((!saved.words || !saved.words.length) && base.words.length) merged.words = base.words;
      if ((!saved.grammar || saved.grammar.length <= 3) && base.grammar.length) merged.grammar = base.grammar;
      return merged;
    }

    function saveData(shouldRender = true) {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(lessons));
      if (shouldRender) renderAll();
    }

    function lesson() {
      return lessons.find((item) => item.id === currentId);
    }

    function renderAll() {
      renderLessonList();
      renderEditor();
      renderRead();
      renderVocabCards();
      renderGrammar();
      renderStats();
      renderReview();
    }

    function renderLessonList() {
      const keyword = $("lessonSearch").value.trim().toLowerCase();
      const items = lessons.filter((item) => {
        return String(item.id).includes(keyword) || item.title.toLowerCase().includes(keyword);
      });
      $("lessonList").innerHTML = items.map((item) => {
        const complete = item.words.length && item.text.trim() ? "已录" : "待录";
        return `<button class="lesson-item ${item.id === currentId ? "active" : ""}" data-id="${item.id}">
          <span class="num">${item.id}</span>
          <span class="lesson-title">${escapeHtml(item.title)}</span>
          <span class="badge">${complete}</span>
        </button>`;
      }).join("");
      document.querySelectorAll(".lesson-item").forEach((btn) => {
        btn.addEventListener("click", () => {
          persistEditor();
          currentId = Number(btn.dataset.id);
          activeTab = "read";
          renderTabs();
          renderAll();
          window.scrollTo({ top: 0, behavior: "smooth" });
        });
      });
    }

    function renderEditor() {
      const item = lesson();
      $("lessonHeading").textContent = `第 ${item.id} 课`;
      $("lessonMeta").textContent = item.title;
      $("lessonTitle").value = item.title;
      $("lessonText").value = item.text;
      $("grammarPoint").value = item.grammarPoint;
      $("wordTable").innerHTML = item.words.map((word, index) => wordRow(word, index)).join("");
      document.querySelectorAll("[data-remove-word]").forEach((btn) => {
        btn.addEventListener("click", () => {
          persistEditor();
          lesson().words.splice(Number(btn.dataset.removeWord), 1);
          saveData();
        });
      });
      document.querySelectorAll("[data-speak-word]").forEach((btn) => {
        btn.addEventListener("click", () => {
          const word = lesson().words[Number(btn.dataset.speakWord)];
          speak(word?.en || "");
        });
      });
    }

    function wordRow(word, index) {
      word = normalizeWordObject(word);
      return `<div class="word-row">
        <input type="text" data-word-en="${index}" placeholder="英文" value="${escapeAttr(word.en || "")}">
        <input type="text" data-word-phonetic="${index}" placeholder="音标" value="${escapeAttr(word.phonetic || "")}">
        <input type="text" data-word-pos="${index}" placeholder="词性" value="${escapeAttr(word.pos || "")}">
        <input type="text" data-word-cn="${index}" placeholder="中文" value="${escapeAttr(word.cn || "")}">
        <button class="icon-btn" data-speak-word="${index}" title="发音">▶</button>
        <button class="warn" data-remove-word="${index}" title="删除这个单词">删除</button>
      </div>`;
    }

    function persistEditor() {
      const item = lesson();
      item.title = $("lessonTitle").value.trim() || `Lesson ${item.id}`;
      item.text = $("lessonText").value;
      item.grammarPoint = $("grammarPoint").value;
      item.words = item.words.map((word, index) => ({
        en: (document.querySelector(`[data-word-en="${index}"]`)?.value || word.en || "").trim(),
        phonetic: (document.querySelector(`[data-word-phonetic="${index}"]`)?.value || word.phonetic || "").trim(),
        pos: (document.querySelector(`[data-word-pos="${index}"]`)?.value || word.pos || "").trim(),
        cn: (document.querySelector(`[data-word-cn="${index}"]`)?.value || word.cn || "").trim()
      })).filter((word) => word.en || word.cn);
      item.review = {
        words: $("doneWords").checked,
        spell: $("doneSpell").checked,
        text: $("doneText").checked,
        grammar: $("doneGrammar").checked
      };
    }

    function renderRead() {
      const item = lesson();
      if (item.text.trim()) {
        $("readingText").innerHTML = renderSpeakableText(item.text, item.words);
      } else if (item.id % 2 === 0) {
        $("readingText").textContent = "本课是句型和单词操练课，没有独立课文。请在“单词测验”和“语法练习”里完成本课训练。";
      } else {
        $("readingText").textContent = "还没有录入课文。";
      }
      $("grammarDisplay").textContent = buildGrammarExpansion(item);
      document.querySelectorAll("[data-say]").forEach((btn) => {
        btn.addEventListener("click", () => speak(btn.dataset.say || ""));
      });
    }

    function renderVocabCards() {
      const item = lesson();
      const words = item.words.map(normalizeWordObject);
      $("vocabCards").innerHTML = item.words.map((rawWord, index) => {
        const word = normalizeWordObject(rawWord);
        return `<div class="word-card">
          <div>
            <b>${escapeHtml(word.en)}</b>
            <div class="meta">${word.phonetic ? `/${escapeHtml(word.phonetic)}/` : "音标待补"} · ${escapeHtml(posLabel(word.pos))}</div>
          </div>
          <button class="icon-btn" data-card-speak="${index}" title="发音">▶</button>
          <div class="meaning">${escapeHtml(word.cn || "中文释义待补")}</div>
        </div>`;
      }).join("") || `<p class="hint">这一课还没有单词。偶数课如果没有课文，就先把本课单词练熟。</p>`;
      $("pronWordSelect").innerHTML = words.map((word, index) => `<option value="${index}">${escapeHtml(word.en)} ${word.phonetic ? "/" + escapeHtml(word.phonetic) + "/" : ""}</option>`).join("");
      updatePronTarget();
      renderPronChatIntro();
      document.querySelectorAll("[data-card-speak]").forEach((btn) => {
        btn.addEventListener("click", () => speak(item.words[Number(btn.dataset.cardSpeak)]?.en || ""));
      });
    }

    function renderStats() {
      const item = lesson();
      $("wordCount").textContent = item.words.length;
      $("grammarCount").textContent = item.grammar.length;
      $("scoreText").textContent = item.lastScore === null ? "0%" : `${item.lastScore}%`;
    }

    function renderGrammar() {
      const item = lesson();
      $("grammarList").innerHTML = item.grammar.map((task, index) => `
        <div class="grammar-item">
          <label>题目</label>
          <textarea data-grammar-prompt="${index}">${escapeHtml(task.prompt || "")}</textarea>
          <label>例句</label>
          <div class="example-box">${escapeHtml(task.example || grammarExampleFor(item.grammarPoint))}</div>
          <label>你的答案</label>
          <textarea data-grammar-user="${index}">${escapeHtml(task.user || "")}</textarea>
          <label>参考答案或老师补充</label>
          <textarea data-grammar-answer="${index}">${escapeHtml(task.answer || "")}</textarea>
          <div class="grammar-actions">
            <button data-check-grammar="${index}" class="primary">检查本题</button>
            <button data-delete-grammar="${index}" class="warn">删除本题</button>
          </div>
          <div class="result feedback-list" data-grammar-result="${index}"></div>
        </div>
      `).join("");
      document.querySelectorAll("[data-check-grammar]").forEach((btn) => {
        btn.addEventListener("click", () => checkGrammarItem(Number(btn.dataset.checkGrammar)));
      });
      document.querySelectorAll("[data-delete-grammar]").forEach((btn) => {
        btn.addEventListener("click", () => deleteGrammarItem(Number(btn.dataset.deleteGrammar)));
      });
    }

    function persistGrammar() {
      const item = lesson();
      item.grammar = item.grammar.map((task, index) => ({
        prompt: document.querySelector(`[data-grammar-prompt="${index}"]`)?.value || task.prompt,
        example: task.example || grammarExampleFor(item.grammarPoint),
        user: document.querySelector(`[data-grammar-user="${index}"]`)?.value || "",
        answer: document.querySelector(`[data-grammar-answer="${index}"]`)?.value || ""
      }));
    }

    function renderReview() {
      const review = lesson().review || {};
      $("doneWords").checked = !!review.words;
      $("doneSpell").checked = !!review.spell;
      $("doneText").checked = !!review.text;
      $("doneGrammar").checked = !!review.grammar;
    }

    function renderTabs() {
      document.querySelectorAll(".tab").forEach((tab) => tab.classList.toggle("active", tab.dataset.tab === activeTab));
      document.querySelectorAll(".tab-page").forEach((page) => page.classList.add("hidden"));
      $(`tab-${activeTab}`).classList.remove("hidden");
    }

    function makeQuiz() {
      persistEditor();
      const item = lesson();
      const words = shuffle(item.words.map(normalizeWordObject).filter((word) => word.en && word.cn)).slice(0, 20);
      if (!words.length) {
        $("quizArea").innerHTML = `<p class="hint">先在“录入”里添加本课单词。</p>`;
        return;
      }
      const mode = $("quizMode").value;
      $("quizArea").innerHTML = words.map((word, index) => {
        const question = quizQuestion(word, mode);
        const answer = quizAnswer(word, mode);
        return `<div class="quiz-card" data-quiz="${index}" data-answer="${escapeAttr(mode === "en-to-cn" ? word.cn : word.en)}">
          <strong>${index + 1}. ${question}</strong>
          <div class="hint">${escapeHtml(word.phonetic ? `/${word.phonetic}/` : "")} ${escapeHtml(posLabel(word.pos))}</div>
          <button class="icon-btn" data-quiz-speak="${index}" title="发音">▶</button>
          <input type="text" data-quiz-answer="${index}" placeholder="输入答案">
          <div class="result" data-quiz-result="${index}"></div>
        </div>`;
      }).join("");
      document.querySelectorAll("[data-quiz]").forEach((card, index) => {
        card.dataset.answer = quizAnswer(words[index], mode);
      });
      document.querySelectorAll("[data-quiz-speak]").forEach((btn) => {
        btn.addEventListener("click", () => speak(words[Number(btn.dataset.quizSpeak)]?.en || ""));
      });
    }

    function checkQuiz() {
      const cards = Array.from(document.querySelectorAll("[data-quiz]"));
      if (!cards.length) return;
      let right = 0;
      cards.forEach((card, index) => {
        const answer = normalize(card.dataset.answer);
        const user = normalize(document.querySelector(`[data-quiz-answer="${index}"]`).value);
        const ok = answer && (user === answer || answer.includes(user) || user.includes(answer));
        if (ok) right += 1;
        const result = document.querySelector(`[data-quiz-result="${index}"]`);
        result.textContent = ok ? "正确" : `再想想，参考：${card.dataset.answer}`;
        result.className = `result ${ok ? "ok" : "bad"}`;
      });
      lesson().lastScore = Math.round((right / cards.length) * 100);
      saveData();
    }

    function importData(file) {
      const reader = new FileReader();
      reader.onload = () => {
        try {
          const parsed = JSON.parse(reader.result);
          if (!Array.isArray(parsed)) throw new Error("bad data");
          const baseLessons = builtInLessons.length ? builtInLessons : initialLessons;
          lessons = baseLessons.map((base) => mergeSavedLesson(base, parsed.find((item) => item.id === base.id)));
          saveData();

    function normalizeWordObject(word) {
      return {
        en: word?.en || "",
        phonetic: word?.phonetic || "",
        pos: word?.pos || "",
        cn: word?.cn || ""
      };
    }

    function posLabel(pos) {
      const labels = {
        n: "名词", v: "动词", a: "形容词", adj: "形容词", ad: "副词", adv: "副词",
        pron: "代词", prep: "介词", int: "感叹词", num: "数词", conj: "连词",
        aux: "助动词", modal: "情态动词", det: "限定词", pl: "复数"
      };
      return labels[String(pos || "").replace(".", "").toLowerCase()] || (pos ? pos : "词性待补");
    }

    function speak(text, options = {}) {
      const value = String(text || "").replace(/\s+/g, " ").trim();
      if (!value || !("speechSynthesis" in window)) return;
      window.speechSynthesis.cancel();
      if (options.expressive) {
        speakExpressive(value);
        return;
      }
      const utterance = new SpeechSynthesisUtterance(value);
      utterance.lang = /[\u4e00-\u9fff]/.test(value) && !/[A-Za-z]{3,}/.test(value) ? "zh-CN" : "en-US";
      utterance.rate = 0.86;
      utterance.pitch = 1.04;
      window.speechSynthesis.speak(utterance);
    }

    function speakExpressive(text) {
      const english = extractEnglishText(text);
      const chunks = english.match(/[^.!?]+[.!?]?/g)?.map((part) => part.trim()).filter(Boolean) || [];
      if (!chunks.length) return;
      let index = 0;
      const next = () => {
        if (index >= chunks.length) return;
        const chunk = chunks[index++];
        const utterance = new SpeechSynthesisUtterance(chunk);
        utterance.lang = "en-US";
        utterance.rate = /[?!]$/.test(chunk) ? 0.78 : 0.84;
        utterance.pitch = /\?$/.test(chunk) ? 1.12 : 1.04;
        utterance.volume = 1;
        utterance.onend = () => setTimeout(next, /[?!]$/.test(chunk) ? 520 : 340);
        window.speechSynthesis.speak(utterance);
      };
      next();
    }

    function extractEnglishText(text) {
      return String(text || "")
        .split(/\n+/)
        .filter((line) => /[A-Za-z]{2,}/.test(line))
        .map((line) => line.replace(/[\u3400-\u9fff]+/g, " ").replace(/\s+/g, " ").trim())
        .filter(Boolean)
        .join(" ");
    }

    function renderSpeakableText(text, words) {
      const wordSet = new Set((words || []).map((word) => normalizeWordObject(word).en.toLowerCase()).filter(Boolean));
      const escaped = escapeHtml(text);
      return escaped.replace(/\b[A-Za-z][A-Za-z'-]*\b/g, (token) => {
        const key = token.toLowerCase();
        if (!wordSet.has(key)) return token;
        return `<button class="click-word" data-say="${escapeAttr(token)}" title="点击发音">${token}</button>`;
      });
    }

    function buildGrammarExpansion(item) {
      const words = (item.words || []).map(normalizeWordObject).slice(0, 10);
      const wordLine = words.length
        ? words.map((word) => `${word.en}${word.phonetic ? " /" + word.phonetic + "/" : ""} ${posLabel(word.pos)}：${word.cn}`).join("\n")
        : "本课暂无单词，先完成语法句型替换。";
      return `${item.grammarPoint.trim() || "还没有录入语法重点。"}\n\n例句：\n${grammarExampleFor(item.grammarPoint)}\n\n本课重点单词/短语：\n${wordLine}`;
    }

    function grammarExampleFor(point) {
      const rules = [
        ["现在完成时", "I have just finished my homework.\nHave you ever been to Paris?"],
        ["现在进行时", "She is reading a book.\nWhat are they doing?"],
        ["一般过去时", "I went to the shop yesterday.\nDid you see him?"],
        ["一般将来时", "I am going to clean the room.\nWe will arrive tomorrow."],
        ["情态动词", "You must stay in bed.\nCan you help me?"],
        ["祈使句", "Open the window, please.\nDon't drop it."],
        ["There be", "There is a cup on the table.\nThere are some books on the shelf."],
        ["比较级", "This one is bigger than that one.\nIt is the most expensive model."],
        ["宾语从句", "He says that he is tired.\nI don't know when he will finish."],
        ["定语从句", "The man who is standing there is my teacher."],
        ["一般疑问句", "Is this your handbag? Yes, it is.\nAre you a teacher? No, I'm not."],
        ["特殊疑问句", "What is your job?\nWhere are the books?"],
        ["物主代词", "This is my pen.\nThat is her dress."],
        ["冠词", "This is a book.\nThe book is on the table."]
      ];
      const found = rules.find(([key]) => String(point || "").includes(key));
      return found ? found[1] : "This is my book.\nIs this your book?\nNo, it isn't.";
    }

    function grammarFeedback(task, point) {
      const user = String(task.user || "").trim();
      const answer = String(task.answer || "").trim();
      if (!user) return { ok: false, messages: ["还没有写答案。先照着例句写 2-3 句，我再帮你检查。"] };
      const messages = [];
      if (answer && normalize(user) === normalize(answer)) {
        return { ok: true, messages: ["正确，和参考答案一致。"] };
      }
      if (!/[.!?。！？]$/.test(user)) messages.push("句末建议加标点：英文句子用 . ? !。");
      if (/\bi\b/.test(user)) messages.push("单独的 I 要大写。");
      if (String(point).includes("一般疑问句") && /\?/.test(user) && !/^\s*(Is|Are|Am|Do|Does|Did|Have|Has|Can|Must|Will|Shall)\b/i.test(user)) {
        messages.push("一般疑问句通常把 be 动词、助动词或情态动词放到句首。");
      }
      if (String(point).includes("现在进行时") && !/\b(am|is|are)\s+\w+ing\b/i.test(user)) {
        messages.push("现在进行时要用 be + doing，例如：She is reading.");
      }
      if (String(point).includes("现在完成时") && !/\b(have|has)\s+\w+/i.test(user)) {
        messages.push("现在完成时要用 have/has + 过去分词。");
      }
      if (String(point).includes("There be") && !/\bThere\s+(is|are|was|were)\b/i.test(user)) {
        messages.push("There be 句型要从 There is/are 开始。");
      }
      if (/\ba\s+[aeiou]/i.test(user)) messages.push("元音音素开头的单词前通常用 an，不用 a。");
      if (messages.length === 0) messages.push("结构基本可以。再对照例句检查：主语、动词形式、冠词、单复数和词序。");
      if (answer) messages.push(`参考答案：${answer}`);
      return { ok: messages.length === 1 && messages[0].startsWith("结构基本可以"), messages };
    }

    function quizQuestion(word, mode) {
      if (mode === "en-to-cn") return escapeHtml(word.en);
      if (mode === "phonetic-to-en") return word.phonetic ? `/${escapeHtml(word.phonetic)}/` : `音标待补：${escapeHtml(word.cn)}`;
      if (mode === "pos-to-en") return `${escapeHtml(posLabel(word.pos))}：${escapeHtml(word.cn)}`;
      return escapeHtml(word.cn);
    }

    function quizAnswer(word, mode) {
      return mode === "en-to-cn" ? word.cn : word.en;
    }

    function parsePastedWord(line) {
      const phonetic = (line.match(/\[([^\]]+)\]/) || [])[1] || "";
      const withoutPhonetic = line.replace(/\[[^\]]+\]/, " ");
      const csv = withoutPhonetic.split(/\s*[,，]\s*/).filter(Boolean);
      if (csv.length >= 4) return { en: csv[0], phonetic: csv[1], pos: csv[2], cn: csv.slice(3).join("，") };
      const match = withoutPhonetic.match(/^(.+?)\s+\b(n|v|a|ad|adv|pron|prep|int|num|conj|aux|modal|det|pl)\.?\s+(.+)$/i);
      if (match) return { en: match[1].trim(), phonetic, pos: match[2].toLowerCase(), cn: match[3].trim() };
      const parts = withoutPhonetic.split(/\s*[:：\t\-—]\s*|\s{2,}/).filter(Boolean);
      return { en: (parts[0] || "").trim(), phonetic, pos: "", cn: parts.slice(1).join(" ").trim() };
    }

    function startPronPractice() {
      const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
      const word = selectedPronTarget();
      if (!word.en) {
        $("pronFeedback").textContent = "先选择一个单词，或输入你想跟读的句子。";
        $("pronFeedback").className = "result bad feedback-list";
        return;
      }
      if (!SpeechRecognition) {
        $("pronFeedback").innerHTML = "当前浏览器不支持语音识别。建议用 Chrome 或 Edge 打开，并允许麦克风权限。";
        $("pronFeedback").className = "result bad feedback-list";
        return;
      }
      if (activeRecognition) activeRecognition.stop();
      const recognition = new SpeechRecognition();
      activeRecognition = recognition;
      recognition.lang = "en-US";
      recognition.interimResults = false;
      recognition.maxAlternatives = 5;
      pronAttempts = 0;
      $("pronFeedback").textContent = "正在听，请读目标内容。";
      $("pronFeedback").className = "result feedback-list";
      recognition.onresult = (event) => {
        pronAttempts += 1;
        const alternatives = Array.from(event.results[0] || []).map((item) => item.transcript);
        const best = alternatives[0] || "";
        const feedback = pronunciationFeedback(word, best, alternatives);
        $("pronMeter").style.width = `${feedback.score}%`;
        $("pronFeedback").innerHTML = feedback.messages.map((msg) => `<div>${escapeHtml(msg)}</div>`).join("");
        $("pronFeedback").className = `result ${feedback.score >= 80 ? "ok" : "bad"} feedback-list`;
        addPronExchange(word.en, best, feedback);
        $("voiceStatus").textContent = feedback.score >= 85 ? "这次不错，可以继续练下一句。" : "这次没听准，按住语音条再读一次。";
      };
      recognition.onerror = (event) => {
        $("pronFeedback").textContent = `没有听清：${event.error || "请检查麦克风权限"}`;
        $("pronFeedback").className = "result bad feedback-list";
        $("voiceStatus").textContent = "没有听清，按住后离手机近一点再读。";
        setTimeout(() => {
          const target = selectedPronTarget().en || "自定义跟读";
          addVoiceBubble(target, pendingAudioUrl, pendingAudioDuration);
          addCoachBubble(`这次我没有听清具体内容。\n你可以先点开自己的语音听一下：音量是否太小、尾音是否漏掉、是否读得太快。\n然后按住语音条再读一次。`);
        }, 260);
      };
      recognition.start();
    }

    function stopPronPractice(showStopped = true) {
      if (activeRecognition) {
        activeRecognition.stop();
        activeRecognition = null;
      }
      if (showStopped) $("pronFeedback").innerHTML += `<div>已停止跟读。</div>`;
    }

    async function startAudioRecording() {
      if (!navigator.mediaDevices?.getUserMedia || !window.MediaRecorder) {
        $("voiceStatus").textContent = "当前浏览器不支持录音回放，请用 Chrome 或 Edge。";
        return;
      }
      try {
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        activeAudioChunks = [];
        activeMediaRecorder = new MediaRecorder(stream);
        activeMediaRecorder.ondataavailable = (event) => {
          if (event.data?.size) activeAudioChunks.push(event.data);
        };
        activeMediaRecorder.onstop = () => {
          const blob = new Blob(activeAudioChunks, { type: activeMediaRecorder.mimeType || "audio/webm" });
          pendingAudioUrl = URL.createObjectURL(blob);
          pendingAudioDuration = Math.max(1, Math.round((Date.now() - holdStartedAt) / 1000));
          stream.getTracks().forEach((track) => track.stop());
        };
        activeMediaRecorder.start();
      } catch {
        $("voiceStatus").textContent = "麦克风权限没有打开，无法保存你的语音。";
      }
    }

    function stopAudioRecording() {
      if (activeMediaRecorder && activeMediaRecorder.state !== "inactive") {
        activeMediaRecorder.stop();
      }
    }

    function pronunciationFeedback(word, heard, alternatives) {
      const target = normalizeSpoken(word.en);
      const guesses = alternatives.map(normalizeSpoken);
      const bestScore = Math.max(...guesses.map((guess) => similarity(target, guess)), 0);
      const score = Math.round(bestScore * 100);
      const messages = [`我听到：${heard || "没有识别到"}`, `目标：${word.en}${word.phonetic ? ` /${word.phonetic}/` : ""}`, `匹配度：${score}%`];
      if (score >= 90) messages.push("很好，发音很接近标准。继续保持重音和尾音。");
      else {
        if (!heard) messages.push("我这次没有听出具体内容。按住语音条重新读，声音靠近麦克风，单词要读完整。");
        else messages.push(`我没有稳定听成 “${word.en}”。再读慢一点，先听标准音，再模仿重音、元音长度和结尾辅音。`);
        messages.push(...phoneticTips(word.phonetic, word.en));
      }
      return { score, messages };
    }

    function renderPronChatIntro() {
      const target = selectedPronTarget();
      $("pronChat").innerHTML = "";
      addCoachBubble(`跟读目标：${target.en || "请选择单词或输入句子"}\n先点“听标准音”，再按住下面的语音条读。`);
    }

    function addPronExchange(target, heard, feedback) {
      setTimeout(() => {
        addVoiceBubble(target, pendingAudioUrl, pendingAudioDuration);
        addCoachBubble(feedback.messages.join("\n"));
      }, 260);
    }

    function addCoachBubble(text) {
      const row = document.createElement("div");
      row.className = "chat-row coach";
      row.innerHTML = `<div class="bubble">${escapeHtml(text)}<div class="chat-meta">${new Date().toLocaleTimeString()}</div></div>`;
      $("pronChat").appendChild(row);
      scrollPronChat();
    }

    function addVoiceBubble(target, audioUrl, duration) {
      const row = document.createElement("div");
      row.className = "chat-row me";
      const playable = audioUrl ? "点击播放我的语音" : "语音未保存";
      row.innerHTML = `<div class="bubble voice-message" data-audio="${escapeAttr(audioUrl || "")}">
        <span>${escapeHtml(playable)} · ${duration || 0}s</span>
        <div class="chat-meta">目标：${escapeHtml(target)}</div>
      </div>`;
      $("pronChat").appendChild(row);
      row.querySelector("[data-audio]").addEventListener("click", (event) => {
        const src = event.currentTarget.dataset.audio;
        if (src) new Audio(src).play();
      });
      scrollPronChat();
    }

    function scrollPronChat() {
      const box = $("pronChat");
      box.scrollTop = box.scrollHeight;
    }

    function phoneticTips(phonetic, word) {
      const tips = [];
      const p = String(phonetic || "");
      const map = [
        ["θ", "注意 /θ/：舌尖轻轻放在上下齿之间，送气，不要读成 /s/。"],
        ["ð", "注意 /ð/：舌尖轻触齿间并振动声带，不要读成 /d/。"],
        ["æ", "注意 /æ/：嘴巴张开，介于“啊”和“诶”之间。"],
        ["ə", "注意 /ə/：弱读音，短而轻，不要读得太满。"],
        ["ʃ", "注意 /ʃ/：像 sh，嘴唇稍圆。"],
        ["ʒ", "注意 /ʒ/：像 vision 中的 s，要振动声带。"],
        ["ŋ", "注意 /ŋ/：舌根抬起，像 sing 结尾，不要加 /g/。"],
        ["r", "注意 /r/：舌头后缩，不要卷得太重。"],
        [":", "音标里的冒号表示长音，要拉长一点。"]
      ];
      map.forEach(([symbol, tip]) => {
        if (p.includes(symbol)) tips.push(tip);
      });
      if (!tips.length) tips.push(`把 ${word} 分成小音节慢读，再连起来读。`);
      return tips.slice(0, 3);
    }

    function normalizeSpoken(text) {
      return String(text || "").toLowerCase().replace(/[^a-z]/g, "");
    }

    function similarity(a, b) {
      if (!a || !b) return 0;
      const distance = levenshtein(a, b);
      return Math.max(0, 1 - distance / Math.max(a.length, b.length));
    }

    function levenshtein(a, b) {
      const dp = Array.from({ length: a.length + 1 }, () => Array(b.length + 1).fill(0));
      for (let i = 0; i <= a.length; i++) dp[i][0] = i;
      for (let j = 0; j <= b.length; j++) dp[0][j] = j;
      for (let i = 1; i <= a.length; i++) {
        for (let j = 1; j <= b.length; j++) {
          dp[i][j] = Math.min(
            dp[i - 1][j] + 1,
            dp[i][j - 1] + 1,
            dp[i - 1][j - 1] + (a[i - 1] === b[j - 1] ? 0 : 1)
          );
        }
      }
      return dp[a.length][b.length];
    }

    function normalize(text) {
      return String(text || "").toLowerCase().replace(/[.,!?;:'"“”‘’。！？；：，、]/g, "").replace(/\s+/g, " ").trim();
    }

    function shuffle(list) {
      return list.map((value) => ({ value, sort: Math.random() })).sort((a, b) => a.sort - b.sort).map(({ value }) => value);
    }

    function escapeHtml(text) {
      return String(text || "").replace(/[&<>"']/g, (char) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[char]));
    }

    function escapeAttr(text) {
      return escapeHtml(text).replace(/`/g, "&#96;");
    }

    document.querySelectorAll(".tab").forEach((tab) => {
      tab.addEventListener("click", () => {
        persistEditor();
        persistGrammar();
        activeTab = tab.dataset.tab;
        renderTabs();
        renderAll();
      });
    });

    $("saveBtn").addEventListener("click", () => { persistEditor(); persistGrammar(); saveData(); });
    $("addWordBtn").addEventListener("click", addWord);
    $("pasteWordsBtn").addEventListener("click", pasteWords);
    $("makeQuizBtn").addEventListener("click", makeQuiz);
    $("checkQuizBtn").addEventListener("click", checkQuiz);
    $("addGrammarBtn").addEventListener("click", addGrammar);
    $("addTranslateBtn").addEventListener("click", addTranslateTask);
    $("checkGrammarBtn").addEventListener("click", checkGrammar);
    $("speakTextBtn").addEventListener("click", () => speak(lesson().text || "", { expressive: true }));
    $("speakGrammarBtn").addEventListener("click", () => speak(grammarExampleFor(lesson().grammarPoint)));
    $("pronWordSelect").addEventListener("change", updatePronTarget);
    $("pronCustomText").addEventListener("input", updatePronTarget);
    $("useSelectedWordBtn").addEventListener("click", useSelectedWordForPron);
    $("speakTargetBtn").addEventListener("click", () => speak(selectedPronTarget().en || "", { expressive: selectedPronTarget().en.includes(" ") }));
    $("voiceHoldBtn").addEventListener("mousedown", beginVoiceHold);
    $("voiceHoldBtn").addEventListener("mouseup", endVoiceHold);
    $("voiceHoldBtn").addEventListener("mouseleave", (event) => {
      if ($("voiceHoldBtn").classList.contains("recording")) endVoiceHold(event);
    });
    $("voiceHoldBtn").addEventListener("touchstart", beginVoiceHold, { passive: false });
    $("voiceHoldBtn").addEventListener("touchend", endVoiceHold, { passive: false });
    $("voiceHoldBtn").addEventListener("touchcancel", endVoiceHold, { passive: false });
    $("exportBtn").addEventListener("click", exportData);
    $("importBtn").addEventListener("click", () => $("fileInput").click());
    $("fileInput").addEventListener("change", (event) => {
      const file = event.target.files[0];
      if (file) importData(file);
      event.target.value = "";
    });
    ["doneWords", "doneSpell", "doneText", "doneGrammar"].forEach((id) => {
      $(id).addEventListener("change", () => { persistEditor(); saveData(); });
    });

    renderTabs();
    renderAll();
  </script>
