<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>新概念英语第一册学习工具</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f6f7f4;
      --panel: #ffffff;
      --ink: #202426;
      --muted: #66706b;
      --line: #d8ded8;
      --accent: #2f6f73;
      --accent-2: #b5462f;
      --soft: #e8f1ee;
      --soft-2: #f7e9e4;
      --ok: #25784d;
      --bad: #b63d36;
      --shadow: 0 12px 30px rgba(28, 41, 35, .09);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: "Microsoft YaHei", "PingFang SC", system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--ink);
    }

    button, input, textarea, select {
      font: inherit;
    }

    button {
      border: 1px solid var(--line);
      background: var(--panel);
      color: var(--ink);
      border-radius: 8px;
      padding: 9px 12px;
      cursor: pointer;
      min-height: 38px;
    }

    button:hover { border-color: var(--accent); }
    button.primary {
      background: var(--accent);
      color: #fff;
      border-color: var(--accent);
    }
    button.warn {
      color: var(--accent-2);
      border-color: #dfb8ae;
      background: #fffaf8;
    }

    .app {
      min-height: 100vh;
      display: grid;
      grid-template-columns: 280px minmax(0, 1fr);
    }

    aside {
      border-right: 1px solid var(--line);
      background: #eef2ed;
      padding: 18px 14px;
      position: sticky;
      top: 0;
      height: 100vh;
      overflow: auto;
    }

    main {
      padding: 22px;
      max-width: 1180px;
      width: 100%;
      margin: 0 auto;
    }

    .brand {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      align-items: center;
      margin-bottom: 14px;
    }

    .brand h1 {
      font-size: 20px;
      line-height: 1.2;
      margin: 0;
    }

    .brand small {
      color: var(--muted);
      display: block;
      margin-top: 4px;
    }

    .search {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 10px 12px;
      margin-bottom: 12px;
      background: #fff;
    }

    .lesson-list {
      display: grid;
      gap: 7px;
    }

    .lesson-item {
      display: grid;
      grid-template-columns: 44px minmax(0, 1fr) auto;
      align-items: center;
      gap: 8px;
      width: 100%;
      text-align: left;
      border-radius: 8px;
      padding: 8px;
      min-height: 48px;
      background: rgba(255, 255, 255, .68);
    }

    .lesson-item.active {
      border-color: var(--accent);
      background: #fff;
      box-shadow: 0 0 0 2px rgba(47, 111, 115, .12);
    }

    .num {
      width: 34px;
      height: 30px;
      border-radius: 7px;
      background: var(--soft);
      display: grid;
      place-items: center;
      font-weight: 700;
      color: var(--accent);
    }

    .lesson-title {
      min-width: 0;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      font-size: 14px;
    }

    .badge {
      font-size: 12px;
      color: var(--muted);
      background: #f8faf7;
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 3px 7px;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 16px;
      margin-bottom: 18px;
    }

    .title-block h2 {
      font-size: 28px;
      margin: 0 0 6px;
    }

    .title-block p {
      margin: 0;
      color: var(--muted);
    }

    .actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .tabs {
      display: flex;
      gap: 8px;
      border-bottom: 1px solid var(--line);
      margin-bottom: 18px;
      overflow: auto;
    }

    .tab {
      border: 0;
      border-bottom: 3px solid transparent;
      border-radius: 0;
      background: transparent;
      color: var(--muted);
      padding: 12px 10px 10px;
      min-width: 76px;
    }

    .tab.active {
      color: var(--accent);
      border-bottom-color: var(--accent);
      font-weight: 700;
    }

    .grid {
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(320px, .76fr);
      gap: 16px;
      align-items: start;
    }

    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
      padding: 16px;
    }

    .panel h3 {
      margin: 0 0 12px;
      font-size: 18px;
    }

    label {
      display: block;
      font-size: 13px;
      color: var(--muted);
      margin: 12px 0 6px;
    }

    input[type="text"], textarea, select {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      color: var(--ink);
      padding: 10px 11px;
    }

    textarea {
      resize: vertical;
      min-height: 120px;
      line-height: 1.65;
    }

    .hint {
      color: var(--muted);
      font-size: 13px;
      line-height: 1.6;
      margin: 8px 0 0;
    }

    .word-table {
      display: grid;
      gap: 8px;
      margin-top: 10px;
    }

    .word-row {
      display: grid;
      grid-template-columns: 1fr .9fr .7fr 1.2fr auto auto;
      gap: 8px;
      align-items: center;
    }

    .icon-btn {
      width: 38px;
      min-width: 38px;
      padding: 0;
      display: inline-grid;
      place-items: center;
      font-weight: 700;
    }

    .vocab-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 10px;
      margin-bottom: 16px;
    }

    .word-card {
      border: 1px solid var(--line);
      background: #fbfcfb;
      border-radius: 8px;
      padding: 12px;
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 8px;
      align-items: start;
    }

    .word-card b {
      display: block;
      font-size: 18px;
      margin-bottom: 4px;
      overflow-wrap: anywhere;
    }

    .word-card .meta {
      color: var(--muted);
      font-size: 13px;
      line-height: 1.5;
    }

    .word-card .meaning {
      grid-column: 1 / -1;
      color: var(--ink);
      line-height: 1.55;
    }

    .click-word {
      border: 0;
      background: transparent;
      padding: 0 1px;
      min-height: 0;
      color: var(--accent);
      border-radius: 4px;
      text-decoration: underline;
      text-underline-offset: 3px;
    }

    .example-box {
      background: var(--soft);
      border: 1px solid #c8d9d5;
      border-radius: 8px;
      padding: 10px 12px;
      line-height: 1.65;
      white-space: pre-wrap;
      margin-bottom: 10px;
    }

    .feedback-list {
      margin-top: 8px;
      line-height: 1.65;
    }

    .practice-box {
      border: 1px solid var(--line);
      background: #fbfcfb;
      border-radius: 8px;
      padding: 14px;
      margin: 14px 0;
    }

    .meter {
      height: 10px;
      background: #e4e8e2;
      border-radius: 999px;
      overflow: hidden;
      margin-top: 8px;
    }

    .meter span {
      display: block;
      height: 100%;
      width: 0%;
      background: var(--accent);
      transition: width .2s ease;
    }

    .voice-bar {
      width: 100%;
      min-height: 58px;
      border-radius: 999px;
      border: 1px solid #bfd5d2;
      background: var(--accent);
      color: #fff;
      display: grid;
      place-items: center;
      font-weight: 700;
      user-select: none;
      touch-action: none;
      box-shadow: 0 8px 22px rgba(47, 111, 115, .18);
    }

    .voice-bar.recording {
      background: var(--accent-2);
      border-color: var(--accent-2);
      transform: scale(.99);
    }

    .voice-status {
      min-height: 26px;
      color: var(--muted);
      margin-top: 8px;
      line-height: 1.5;
    }

    .chat-thread {
      min-height: 420px;
      max-height: 620px;
      overflow: auto;
      background: #f1f4ef;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 14px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .chat-row {
      display: flex;
    }

    .chat-row.me { justify-content: flex-end; }
    .chat-row.coach { justify-content: flex-start; }

    .bubble {
      max-width: min(76%, 520px);
      border-radius: 8px;
      padding: 10px 12px;
      line-height: 1.6;
      background: #fff;
      border: 1px solid var(--line);
      white-space: pre-wrap;
    }

    .chat-row.me .bubble {
      background: #dff0e8;
      border-color: #bfddcf;
    }

    .voice-message {
      min-width: 150px;
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      user-select: none;
    }

    .voice-message::before {
      content: "▶";
      display: inline-grid;
      place-items: center;
      width: 24px;
      height: 24px;
      border-radius: 999px;
      background: rgba(47, 111, 115, .14);
      color: var(--accent);
      font-size: 12px;
      flex: 0 0 auto;
    }

    .chat-meta {
      color: var(--muted);
      font-size: 12px;
      margin-top: 4px;
    }

    .reading-text {
      white-space: pre-wrap;
      line-height: 1.9;
      font-size: 18px;
      background: #fbfcfb;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 16px;
      min-height: 260px;
    }

    .tools-row {
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
      margin-bottom: 12px;
    }

    .quiz-card {
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 14px;
      background: #fbfcfb;
      margin-bottom: 12px;
    }

    .quiz-card strong {
      display: block;
      margin-bottom: 8px;
    }

    .result {
      margin-top: 8px;
      font-weight: 700;
    }

    .result.ok { color: var(--ok); }
    .result.bad { color: var(--bad); }

    .grammar-list {
      display: grid;
      gap: 10px;
    }

    .grammar-item {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fbfcfb;
      padding: 12px;
    }

    .grammar-item textarea {
      min-height: 70px;
    }

    .grammar-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 10px;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
      margin-bottom: 14px;
    }

    .stat {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 12px;
    }

    .stat b {
      display: block;
      font-size: 24px;
      color: var(--accent);
    }

    .stat span { color: var(--muted); font-size: 13px; }

    .hidden { display: none !important; }

    @media (max-width: 900px) {
      .app { grid-template-columns: 1fr; }
      aside {
        position: sticky;
        z-index: 5;
        height: auto;
        max-height: none;
        top: 0;
        border-right: 0;
        border-bottom: 1px solid var(--line);
        padding: 12px;
      }
      main { padding: 12px; }
      .brand { margin-bottom: 10px; }
      .brand h1 { font-size: 18px; }
      .lesson-list {
        display: flex;
        gap: 8px;
        overflow-x: auto;
        padding-bottom: 4px;
      }
      .lesson-item {
        grid-template-columns: 34px minmax(78px, 120px);
        min-width: 150px;
      }
      .lesson-item .badge { display: none; }
      .tabs {
        position: sticky;
        top: 126px;
        z-index: 4;
        background: var(--bg);
        margin: 0 -12px 14px;
        padding: 0 12px;
      }
      .tab { min-width: auto; padding: 11px 8px 9px; }
      .grid { grid-template-columns: 1fr; }
      .topbar { flex-direction: column; }
      .actions { justify-content: flex-start; }
      .stats { grid-template-columns: 1fr; }
      .word-row { grid-template-columns: 1fr; }
      .vocab-grid { grid-template-columns: 1fr; }
      .panel { padding: 12px; box-shadow: none; }
      .reading-text { font-size: 16px; min-height: 180px; padding: 12px; }
      .chat-thread { min-height: 360px; max-height: 58vh; padding: 10px; }
      .bubble { max-width: 86%; }
      .title-block h2 { font-size: 24px; }
      button { min-height: 42px; }
    }
  </style>
</head>
<body>
  <div class="app" id="appShell">
    <aside>
      <div class="brand">
        <div>
          <h1>新概念一</h1>
          <small>每课单独练</small>
        </div>
        <span class="badge" id="totalBadge">144课</span>
      </div>
      <input id="lessonSearch" class="search" type="text" placeholder="搜索课号或标题">
      <div class="lesson-list" id="lessonList"></div>
    </aside>

    <main>
      <div class="topbar">
        <div class="title-block">
          <h2 id="lessonHeading">第 1 课</h2>
          <p id="lessonMeta">听课文、练单词、做语法。</p>
        </div>
        <div class="actions">
          <button id="exportBtn" title="导出全部学习数据">导出</button>
          <button id="importBtn" title="导入之前导出的学习数据">导入</button>
          <button id="saveBtn" class="primary hidden" title="保存当前课程">保存</button>
        </div>
      </div>

      <div class="stats">
        <div class="stat"><b id="wordCount">0</b><span>本课单词</span></div>
        <div class="stat"><b id="grammarCount">0</b><span>语法练习</span></div>
        <div class="stat"><b id="scoreText">0%</b><span>最近测验</span></div>
      </div>

      <div class="tabs" role="tablist">
        <button class="tab active" data-tab="read">课文</button>
        <button class="tab" data-tab="vocab">单词测验</button>
        <button class="tab" data-tab="pron">跟读</button>
        <button class="tab" data-tab="grammar">语法练习</button>
        <button class="tab" data-tab="review">复习</button>
      </div>

      <section id="tab-edit" class="tab-page hidden">
        <div class="grid">
          <div class="panel">
            <h3>课程内容</h3>
            <label for="lessonTitle">本课标题</label>
            <input id="lessonTitle" type="text" placeholder="例如：Lesson 1">
            <label for="lessonText">课文</label>
            <textarea id="lessonText" placeholder="把你正在学习的这一课课文粘贴到这里。"></textarea>
            <label for="grammarPoint">本课语法重点</label>
            <textarea id="grammarPoint" placeholder="例如：一般疑问句、物主代词、there be 句型等。"></textarea>
            <p class="hint">提示：为了方便你长期学习，内容只保存在本机浏览器里。建议偶尔点“导出”备份。</p>
          </div>

          <div class="panel">
            <h3>单词表</h3>
            <div class="tools-row">
              <button id="addWordBtn">添加单词</button>
              <button id="pasteWordsBtn">批量粘贴</button>
            </div>
            <div class="word-table" id="wordTable"></div>
            <p class="hint">批量粘贴格式：每行一个，英文和中文用空格、逗号、冒号、制表符或破折号隔开。</p>
          </div>
        </div>
      </section>

      <section id="tab-read" class="tab-page hidden">
        <div class="grid">
          <div class="panel">
            <div class="tools-row">
              <h3>课文精读</h3>
              <button id="speakTextBtn" class="icon-btn" title="朗读课文">▶</button>
            </div>
            <div id="readingText" class="reading-text"></div>
          </div>
          <div class="panel">
            <div class="tools-row">
              <h3>本课语法</h3>
              <button id="speakGrammarBtn" class="icon-btn" title="朗读语法例句">▶</button>
            </div>
            <div id="grammarDisplay" class="reading-text"></div>
          </div>
        </div>
      </section>

      <section id="tab-vocab" class="tab-page hidden">
        <div class="panel">
          <div class="tools-row">
            <select id="quizMode" title="选择测验方向">
              <option value="en-to-cn">英文 → 中文</option>
              <option value="cn-to-en">中文 → 英文</option>
              <option value="phonetic-to-en">音标 → 英文</option>
              <option value="pos-to-en">词性+中文 → 英文</option>
            </select>
            <button id="makeQuizBtn" class="primary">生成测验</button>
            <button id="checkQuizBtn">批改</button>
          </div>
          <div id="vocabCards" class="vocab-grid"></div>
          <div id="quizArea"></div>
        </div>
      </section>

      <section id="tab-pron" class="tab-page hidden">
        <div class="grid">
          <div class="panel">
            <h3>跟读纠音</h3>
            <label for="pronWordSelect">本课单词</label>
            <select id="pronWordSelect" title="选择要练习的单词"></select>
            <label for="pronCustomText">也可以输入任意单词或句子</label>
            <textarea id="pronCustomText" placeholder="例如：apple / Is this your handbag?"></textarea>
            <div class="tools-row">
              <button id="useSelectedWordBtn">使用选中单词</button>
              <button id="speakTargetBtn">听标准音</button>
            </div>
            <div id="voiceHoldBtn" class="voice-bar">按住说话</div>
            <div id="voiceStatus" class="voice-status">松开后我会根据识别结果给你纠音建议。</div>
            <div class="hint" id="pronTarget">选择一个单词，或输入任意句子，然后点击开始跟读。</div>
            <div class="meter"><span id="pronMeter"></span></div>
            <div class="result feedback-list" id="pronFeedback"></div>
          </div>
          <div class="panel">
            <h3>跟读对话</h3>
            <div id="pronChat" class="chat-thread"></div>
          </div>
        </div>
      </section>

      <section id="tab-grammar" class="tab-page hidden">
        <div class="panel">
          <div class="tools-row">
            <button id="addGrammarBtn">添加语法题</button>
            <button id="addTranslateBtn">翻译句子</button>
            <button id="checkGrammarBtn" class="primary">批改语法</button>
          </div>
          <div class="grammar-list" id="grammarList"></div>
          <p class="hint">建议每课至少做 5 题：仿写、改疑问句、改否定句、翻译句子、替换主语或物品。</p>
        </div>
      </section>

      <section id="tab-review" class="tab-page hidden">
        <div class="panel">
          <h3>本课复习清单</h3>
          <div class="grammar-list">
            <label><input type="checkbox" id="doneWords"> 单词能看英文说中文</label>
            <label><input type="checkbox" id="doneSpell"> 单词能看中文拼英文</label>
            <label><input type="checkbox" id="doneText"> 课文读 3 遍并理解句子结构</label>
            <label><input type="checkbox" id="doneGrammar"> 本课语法题正确率达到 80%</label>
          </div>
        </div>
      </section>
    </main>
  </div>

  <input id="fileInput" class="hidden" type="file" accept="application/json">

  <script>
    const TOTAL_LESSONS = 144;
    const STORAGE_KEY = "nce1_lesson_tool_v5";
    let activeRecognition = null;
    let pronAttempts = 0;
    let holdStartedAt = 0;
    let activeMediaRecorder = null;
    let activeAudioChunks = [];
    let pendingAudioUrl = "";
    let pendingAudioDuration = 0;
    const initialLessons = Array.from({ length: TOTAL_LESSONS }, (_, index) => ({
      id: index + 1,
      title: `Lesson ${index + 1}`,
      text: "",
      grammarPoint: "",
      words: [],
      grammar: defaultGrammar(index + 1),
      review: { words: false, spell: false, text: false, grammar: false },

 there,behind the teapot.\nPENNY: Can you see it?\nSAM:   I can see the teapot,but I can't see the tea.\nPENNY: There it is!It's in front of your!\nSAM:   Ah yes, I can see it now.\nSAM:   Where are the cups?\nPENNY: There are some in the cupboard.\nPENNY: Can you find them?\nSAM:   Yes. Here they are.\nPENNY: Hurry up, Sam!The kettle's boiling!","grammarPoint":"情态动词：can/must/may 等后接动词原形，表达能力、许可或必要。\nThere be 句型：There is/are 表示某处存在某物。\n宾语从句和间接引语：用 that/if/whether/疑问词引导从句。","words":[{"en":"of course","phonetic":"əv'kɔ:s","pos":"","cn":"当然"},{"en":"kettle","phonetic":"'ketl","pos":"n","cn":"水壶"},{"en":"behind","phonetic":"bi'haind","pos":"prep","cn":"在 ... 后面"},{"en":"teapot","phonetic":"'ti:pɔt","pos":"n","cn":"茶壶"},{"en":"now","phonetic":"nau","pos":"ad","cn":"现在,此刻"},{"en":"find","phonetic":"faind","pos":"v","cn":"找到"},{"en":"boil","phonetic":"bɔil","pos":"v","cn":"沸腾,开"}],"grammar":[{"prompt":"语法点：情态动词：can/must/may 等后接动词原形，表达能力、许可或必要。\n仿写 3 个句子，尽量替换主语、物品或地点。","example":"You must stay in bed. / Can you help me?","answer":"","user":""},{"prompt":"把本课一个肯定句改成否定句，再改成一般疑问句。","example":"This is your handbag. -> This is not your handbag. -> Is this your handbag?","answer":"","user":""},{"prompt":"用本课单词写 2 组问答，回答要完整。","example":"Whose handbag is it? It is my handbag.","answer":"","user":""},{"prompt":"中译英：自己写一个包含本课语法点的中文句子，并翻译成英文。","example":"这是你的手提包吗？ -> Is this your handbag?","answer":"","user":""}],"review":{"words":false,"spell":false,"text":false,"grammar":false},"lastScore":null},{"id":44,"title":"Lesson 44","text":"","grammarPoint":"本课为句型操练课，重点巩固：情态动词 can；请求、许可和能力表达。","words":[],"grammar":[{"prompt":"知识点：情态动词 can；请求、许可和能力表达。\n仿写 5 组替换句，保持句型不变，只替换主语、物品、地点或形容词。","example":"You must stay in bed. / Can you help me?","answer":"","user":""},{"prompt":"把 3 个肯定句分别改成否定句和一般疑问句，并写出 Yes/No 回答。","example":"This is my pen. -> This is not my pen. -> Is this your pen? Yes, it is.","answer":"","user":""},{"prompt":"用本课单词写 3 组短问答，要求至少包含一个代词、一个 be 动词或助动词。","example":"Is this your book ways\ndo their homework. Then they go to bed. Mr. Sawyer usually reads his\nnewspaper, but sometimes he and his wife watch television.","grammarPoint":"物主代词和指示代词：this/that/these/those 与 my/your/his/her 等。\n名词单复数与冠词：a/an/the 和可数名词单复数的搭配。","words":[{"en":"live","phonetic":"liv","pos":"v","cn":"住,生活"},{"en":"stay","phonetic":"stei","pos":"v","cn":"呆在,停留"},{"en":"home","phonetic":"həum","pos":"n","cn":"家 ad. 在家,到家"},{"en":"housework","phonetic":"'hauswə:k","pos":"n","cn":"家务"},{"en":"lunch","phonetic":"lʌntʃ","pos":"n","cn":"午饭"},{"en":"afternoon","phonetic":"ˌɑ:ftə'nu:n","pos":"n","cn":"下午"},{"en":"usually","phonetic":"'ju:ʒuəli, 'ju:ʒəli","pos":"ad","cn":"通常"},{"en":"together","phonetic":"tə'geðə","pos":"ad","cn":"一起"},{"en":"evening","phonetic":"'i:vniŋ","pos":"n","cn":"晚上"},{"en":"arrive","phonetic":"ə'raiv","pos":"v","cn":"到达"},{"en":"night","phonetic":"nait","pos":"n","cn":"夜间"}],"grammar":[{"prompt":"语法点：物主代词和指示代词：this/that/these/those 与 my/your/his/her 等。\n仿写 3 个句子，尽量替换主语、物品或地点。","example":"This is my pen. That is her dress.","answer":"","user":""},{"prompt":"把本课一个肯定句改成否定句，再改成一般疑问句。","example":"This is your handbag. -> This is not your handbag. -> Is this your handbag?","answer":"","user":""},{"prompt":"用本课单词写 2 组问答，回答要完整。","example":"Whose handbag is it? It is my handbag.","answer":"","user":""},{"prompt":"中译英：自己写一个包含本课语法点的中文句子，并翻译成英文。","example":"这是你的手提包吗？ -> Is this your handbag?","answer":"","user":""}],"review":{"words":false,"spell":false,"text":false,"grammar":false},"lastScore":null},{"id":56,"title":"Lesson 56","text":"","grammarPoint":"本课为句型操练课，重点巩固：家庭成员的一般现在时；时间状语和日常习惯。","words":[],"grammar":[{"prompt":"知识点：家庭成员的一般现在时；时间状语和日常习惯。\n仿写 5 组替换句，保持句型不变，只替换主语、物品、地点或形容词。","example":"This is my book. -> Is this your book? -> No, it isn't.","answer":"","user":""},{"prompt":"把 3 个肯定句分别改成否定句和一般疑问句，并写出 Yes/No 回答。","example":"This is my pen. -> This is not my pen. -> Is this your pen? Yes, it is.","answer":"","user":""},{"prompt":"用本课单词写 3 组短问答，要求至少包含一个代词、一个 be 动词或  books? -> Are these your books?","answer":"","user":""}],"review":{"words":false,"spell":false,"text":false,"grammar":false},"lastScore":null},{"id":73,"title":"Lesson 73 The way to King Street","text":"到国王街的走法\nListen to the tape then answer this question. Why did the man need a\nphrasebook?\n听录音,然后回答问题。为什么这位男士需要一本常用语手册?\nLast week Mrs. Mills went to London. She does not know London very\nwell, and she lost her way.Suddenly, she saw a man near a bus stop. 'I can\nask him the way.' she said to herself.'Excuse me,' she said. 'Can you tell me\nthe way to King Street, please?'The man smiled pleasantly. He did not\nunderstand English! He spoke German. He was a tourist.Then he put his\nhand into pocket, and took out a phrasebook. He opened the book and found\na phrase. He read the phrase slowly. 'I am sorry,' he said. 'I do not speak\nEnglish.'","grammarPoint":"一般过去时：动词过去式，讲述过去发生的事情。\n情态动词：can/must/may 等后接动词原形，表达能力、许可或必要。\n物主代词和指示代词：this/that/these/those 与 my/your/his/her 等。","words":[{"en":"week","phonetic":"wi:k","pos":"n","cn":"周"},{"en":"London","phonetic":"'lʌndən","pos":"n","cn":"伦敦"},{"en":"suddenly","phonetic":"'sʌdnli","pos":"ad","cn":"突然地"},{"en":"bus stop","phonetic":"'bʌstɔp","pos":"","cn":"公共汽⻋⻋站"},{"en":"smile","phonetic":"smail","pos":"v","cn":"微笑"},{"en":"pleasantly","phonetic":"'plezntli","pos":"ad","cn":"愉快地"},{"en":"understand","phonetic":"ˌʌndə'stænd","pos":"v","cn":"懂,明白"},{"en":"speak","phonetic":"spi:k","pos":"v","cn":"讲,说"},{"en":"hand","phonetic":"hænd","pos":"n","cn":"手"},{"en":"pocket","phonetic":"'pɔkit","pos":"n","cn":"衣袋"},{"en":"phrasebook","phonetic":"","pos":"n","cn":"短语手册,常用语手册"},{"en":"phrase","phonetic":"freiz","pos":"n","cn":"短语"},{"en":"slowly","phonetic":"'sləuli","pos":"ad","cn":"缓慢地"}],"grammar":[{"prompt":"语法点：一般过去时：动词过去式，讲述过去发生的事情。\n仿写 3 个句子，尽量替换主语、物品或地点。","example":"I went to the shop yesterday. / Did you see him?","answer":"","user":""},{"prompt":"把本课一个肯定句改成否定句，再改成一般疑问句。","example":"This is your handbag. -> This is not your h ANT: We had some shoes like those a month ago, but we\ndon't have any now.\nLADY:           Can you get a pair for me, please?\nSHOP ASSISTANT: I'm afraid that I can't. They were in fashion last year\nand the year before last.But they're not in fashion this year.\nSHOP ASSISTANT: These shoes are in fashion now.\nLADY:           They look very uncomfortable.\nSHOP ASSISTANT: They are very uncomfortable. But women always\nwear uncomfortable shoes!","grammarPoint":"一般过去时：动词过去式，讲述过去发生的事情。\n情态动词：can/must/may 等后接动词原形，表达能力、许可或必要。\n祈使句：用动词原形发出请求、命令或提醒。","words":[{"en":"ago","phonetic":"ə'gəu","pos":"ad","cn":"以前"},{"en":"buy","phonetic":"bai","pos":"v","cn":"买"},{"en":"pair","phonetic":"peə","pos":"n","cn":"双,对"},{"en":"fashion","phonetic":"'fæʃən","pos":"n","cn":"服装的 ) 流行式样"},{"en":"uncomfortable","phonetic":"ʌn'kʌmftəbəl","pos":"a","cn":"不舒服的"},{"en":"wear","phonetic":"weə","pos":"v","cn":"穿着"}],"grammar":[{"prompt":"语法点：一般过去时：动词过去式，讲述过去发生的事情。\n仿写 3 个句子，尽量替换主语、物品或地点。","example":"I went to the shop yesterday. / Did you see him?","answer":"","user":""},{"prompt":"把本课一个肯定句改成否定句，再改成一般疑问句。","example":"This is your handbag. -> This is not your handbag. -> Is this your handbag?","answer":"","user":""},{"prompt":"用本课单词写 2 组问答，回答要完整。","example":"Whose handbag is it? It is my handbag.","answer":"","user":""},{"prompt":"中译英：自己写一个包含本课语法点的中文句子，并翻译成英文。","example":"这是你的手提包吗？ -> Is this your handbag?","answer":"","user":""}],"review":{"words":false,"spell":false,"text":false,"grammar":false},"lastScore":null},{"id":76,"title":"Lesson 76","text":"","grammarPoint":"本课为句型操练课，重点巩固：形容词比较与尺码表达；too + 形容词。","words":[],"grammar":[{"prompt":"知识点：形容词比较与尺码表达；too + 形容词。\n仿写 5 组替换句，保持句型不变，只替换主语、物品、地点或形容词。","example":"This is my book. -> Is this your book? -> No, it isn't.","answer":"","user":""},{"prompt":"把 3 个肯定句分别改成否定句和一般疑问句，并写出 Yes/No 回答。","example":"This is my pen. -> This is not my pen. -> Is this your pen? Yes, it is.","answer":"","user":""},{"prompt":"用本课单词写 3 组短问答，要求至少包含一个代词、一个 be 动词或助动词。","e n are you going to have a holiday, Sam?\nSAM:   I don't know.I've already had my holiday this year.\nCAROL: Where did you go?\nSAM:   I stayed at home!","grammarPoint":"现在进行时：be + doing，询问或描述正在发生的动作。\n一般过去时：动词过去式，讲述过去发生的事情。\n一般将来时：will/shall 或 be going to，表达计划和将来动作。","words":[{"en":"mess","phonetic":"mes","pos":"n","cn":"杂乱,凌乱"},{"en":"pack","phonetic":"pæk","pos":"v","cn":"包装,打包,装箱"},{"en":"suitcase","phonetic":"'su:tkeis, 'sju:t","pos":"n","cn":"手提箱"},{"en":"leave","phonetic":"li:v","pos":"v","cn":"离开"},{"en":"already","phonetic":"ɔ:l'redi","pos":"ad","cn":"已经"}],"grammar":[{"prompt":"语法点：现在进行时：be + doing，询问或描述正在发生的动作。\n仿写 3 个句子，尽量替换主语、物品或地点。","example":"She is reading a book. / What are they doing?","answer":"","user":""},{"prompt":"把本课一个肯定句改成否定句，再改成一般疑问句。","example":"This is your handbag. -> This is not your handbag. -> Is this your handbag?","answer":"","user":""},{"prompt":"用本课单词写 2 组问答，回答要完整。","example":"Whose handbag is it? It is my handbag.","answer":"","user":""},{"prompt":"中译英：自己写一个包含本课语法点的中文句子，并翻译成英文。","example":"这是你的手提包吗？ -> Is this your handbag?","answer":"","user":""}],"review":{"words":false,"spell":false,"text":false,"grammar":false},"lastScore":null},{"id":84,"title":"Lesson 84","text":"","grammarPoint":"本课为句型操练课，重点巩固：现在完成时初步：have/has been to。","words":[],"grammar":[{"prompt":"知识点：现在完成时初步：have/has been to。\n仿写 5 组替换句，保持句型不变，只替换主语、物品、地点或形容词。","example":"I have just finished my homework. / Have you ever been to Paris?","answer":"","user":""},{"prompt":"把 3 个肯定句分别改成否定句和一般疑问句，并写出 Yes/No 回答。","example":"This is my pen. -> This is not my pen. -> Is this your pen? Yes, it is.","answer":"","user":""},{"prompt":"用本课单词写 3 组短问答，要求至少包含一个代词、一个 be 动词或助动词。","example":"Is this your book? No, it isn't. It is my teacher's book.","answer":"","user":""},{"prompt":"中译英：围绕本课语法点写 3 个中文句子，再翻译成英文。","example":"这是一辆小汽车吗？ -> Is this a car?","answer":"","user":""},{"prompt":"错句改正：自己故意写 3 个含本课语法错误的英文句子，然后改正。","example":"Is this your books? -> Are these your books?","answer":"","user":""}],"review":{"words":false,"spell":false,"text":false,"grammar":false},"lastScore":null},{"id":85,"title":"Lesson 85 Pairs in the spring","text":"巴黎之春\nListen to the tape then answer this question. At what time of year did Ken\nvisit Paris?\n听录音,然后回答问题。肯是在什么季节访问巴黎的?\nGEORGE: Hello, Ken.\nKEN:    Hi, George.\nGEORGE: Have you just been to the cinema?\nKEN:    Yes, I have.\nGEORGE: What's on?\nKEN:    'Paris in the spring'.\nGEORGE: Oh, I've already seen it.I saw it on television last year.It's an old\nfilm,but it's very good.\nKEN:    Paris is a beautiful city.\nGEORGE: I've never been there.Have you ever been there, Ken?\nKEN:    Yes, I have.I was there in April.\nGEORGE: Pairs in the spring, eh?\nKEN:    It was spring,but the weather was awful.It rained all the time.\nGEORGE: Just like London!","grammarPoint":"现在完成时：have/has + 过去分词，表达已经发生并影响现在的动作。\n一般过去时：动词过去式，讲述过去发生的事情。\n一般疑问句：be 动词或助动词提前，回答用 Yes/No。","words":[{"en":"Paris","phonetic":"'pæris","pos":"n","cn":"巴黎"},{"en":"cinema","phonetic":"'sinimə","pos":"n","cn":"电影院"},{"en":"film","phonetic":"film","pos":"n","cn":"电影"},{"en":"beautiful","phonetic":"'bju:tifəl","pos":"a","cn":"漂亮的"},{"en":"city","phonetic":"'siti","pos":"n","cn":"城市"},{"en":"never","phonetic":"'nevə","pos":"ad","cn":"从来没有"},{"en":"ever","phonetic":"'evə","pos":"ad","cn":"在任何时候"}],"grammar":[{"prompt":"语法点：现在完成时：have/has + 过去分词，表达已经发生并影响现在的动作。\n仿写 3 个句子，尽量替换主语、物品或地点。","example":"I have just finished my homework. / Have you ever been to Paris?","answer":"","user":""},{"prompt":"把本课一个肯定句改成否定句，再改成一般疑问句。","example":"This is your handbag. -> This is not your handbag. -> Is this your handbag?","answer":"","user":""},{"prompt":"用本课单词写 2 组问答，回答要完整。","example":"Whose handbag is it? It is my handbag.","answer":"","user":""},{"prompt":"中译英：自己写一个包含本课语法点的中文句子，并翻译成英文。","example":"这是你的手提包吗？ -> Is this your handbag?","answer":"","user":""}],"review":{"words":false,"spell":false,"text":false,"grammar":false},"lastScore":null},{"id":86,"title":"Lesson 86"  it, please?\nIAN:   Yes, of course. Come in.\nNIGEL : How long have you lived here?\nIAN:   I've live here for twenty years.\nNIGEL : Twenty year!That's long time.\nIAN:   Yes, I've been here since 1976.\nNIGEL : Then why do you want to sell it?\nIAN:   Because I've just retired.I want to buy a small house in the country.\nNIGEL : How much does this house cost?\nIAN:   $68,500.\nNIGEL : Well, I like the house.But I can't decide yet.My wife must see it\nfirst.\nIAN:   Women always have the last word.","grammarPoint":"现在完成时：have/has + 过去分词，表达已经发生并影响现在的动作。\n一般过去时：动词过去式，讲述过去发生的事情。\n情态动词：can/must/may 等后接动词原形，表达能力、许可或必要。","words":[{"en":"believe","phonetic":"bi'li:v","pos":"v","cn":"相信,认为"},{"en":"may (","phonetic":"mei","pos":"","cn":"用于请求许可 ) 可以"},{"en":"how long","phonetic":"","pos":"","cn":"多⻓"},{"en":"since","phonetic":"sins","pos":"prep","cn":"自从"},{"en":"why","phonetic":"wai","pos":"ad","cn":"为什么"},{"en":"sell","phonetic":"sel","pos":"v","cn":"卖,出售"},{"en":"because","phonetic":"bi'kɔz","pos":"conj","cn":"因为"},{"en":"retire","phonetic":"ri'taiə","pos":"v","cn":"退休"},{"en":"cost","phonetic":"kɔst","pos":"v","cn":"花费"},{"en":"pound","phonetic":"paund","pos":"n","cn":"英镑"},{"en":"worth","phonetic":"wə:θ","pos":"prep","cn":"值 ... 钱"},{"en":"penny","phonetic":"'peni","pos":"n","cn":"便士"}],"grammar":[{"prompt":"语法点：现在完成时：have/has + 过去分词，表达已经发生并影响现在的动作。\n仿写 3 个句子，尽量替换主语、物品或地点。","example":"I have just finished my homework. / Have you ever been to Paris?","answer":"","user":""},{"prompt":"把本课一个肯定句改成否定句，再改成一般疑问句。","example":"This is your handbag. -> This is not your handbag. -> Is this your handbag?","answer":"","user":""},{"prompt":"用本课单词写 2 组问答，回答要完整。","example":"Whose handbag is it? It is my handbag.","answer":"","user":""},{"prompt":"中译英：自己写一个包含本课语法点的中文句子，并翻译成英文。","example":"这是你的手提包吗？ -> Is this your handbag?","answer":"","user":""}],"review":{"words":false,"spell":false,"text":false,"grammar":false},"lastScore":null},{"id":90,"title":"Lesson 90","text":"","grammarPoint" NNY:       'I have just arrive in Scotland and I'm staying at a Youth\nHostel.'\nGRANDMOTHER: Eh?\nPENNY:       He say he's just arrived in Scotland. He says he's staying at a\nYouth Hostel.You know he's a member of the Y.H.A.\nGRANDMOTHER: The what?\nPENNY:       The Y.H.A., Mum.The Youth Hostels Association.\nGRANDMOTHER: What else does he say?\nPENNY:       'I'll write a letter soon.I hope you all well.'\nGRANDMOTHER: What?Speak up. Penny.I'm afraid I can't hear you\nPENNY:       He say he'll write a letter soon. He hopes we are all well.\n'Love, Jimmy.'\nGRANDMOTHER: Is that all?He doesn't say very much,does he?\nPENNY:       He can't write very much on a card, Mum.","grammarPoint":"情态动词：can/must/may 等后接动词原形，表达能力、许可或必要。\n宾语从句和间接引语：用 that/if/whether/疑问词引导从句。\n一般疑问句：be 动词或助动词提前，回答用 Yes/No。","words":[{"en":"Scotland","phonetic":"'skɔtlənd","pos":"n","cn":"苏格兰 ( 英国 )"},{"en":"card","phonetic":"kɑ:d","pos":"n","cn":"明信片"},{"en":"youth","phonetic":"ju:θ","pos":"n","cn":"年"},{"en":"hostel","phonetic":"'hɔstəl","pos":"n","cn":"招待所,旅馆"},{"en":"association","phonetic":"əˌsəusi'eiʃən","pos":"n","cn":"协会"},{"en":"soon","phonetic":"su:n","pos":"ad","cn":"不久"},{"en":"write","phonetic":"rait","pos":"v","cn":"写"}],"grammar":[{"prompt":"语法点：情态动词：can/must/may 等后接动词原形，表达能力、许可或必要。\n仿写 3 个句子，尽量替换主语、物品或地点。","example":"You must stay in bed. / Can you help me?","answer":"","user":""},{"prompt":"把本课一个肯定句改成否定句，再改成一般疑问句。","example":"This is your handbag. -> This is not your handbag. -> Is this your handbag?","answer":"","user":""},{"prompt":"用本课单词写 2 组问答，回答要完整。","example":"Whose handbag is it? It is my handbag.","answer":"","user":""},{"prompt":"中译英：自己写一个包含本课语法点的中文句子，并翻译成英文。","example":"这是你的手提包吗？ -> Is this your handbag?","answer":"","user":""}],"review":{"words":false,"spell":false,"text":false,"grammar":false},"lastScore":null},{"id":102,"title":"Lesson 102","text":"","grammarPoint":"本课为句型操练课，重点巩固：书信表达和宾语从句初步。","words":[],"grammar":[{"prompt":"知识点：书信表达和宾语从句初步。\n仿写 5 组替换句，保持句型不变，只替换主语、物品、地点或形容词。","example":"He says that he is tired. / I don't know when he will finish.","answer":"","user":""},{"prompt":"把 3 个肯定句分别改成否定句和一般疑问句，并写出 Yes/No 回答。","example":"This is my pen. -> This is not my pen. -> Is this your pen? Yes, it is.","answer":"","user":""},{"prompt":"用本课单词写 3 组短问答，要求至少包含一个代词、一个 be 动词或助动词。","example":"Is this your book? No, it isn't. It is my teacher's book.","answer":"","user":""},{"prompt":"中译英：围绕本课语法点写 3 个中文句子，再翻译成英文。","example":"这是一辆小汽车吗？ -> Is this a car?","answer":"","user":""},{"prompt":"错句改正：自己故意写 3 个含本课语法错误的英文句子，然后改正。","example":"Is this your books? -> Are these your books?","answer":"","user":""}],"review":{"words":false,"spell":false,"text":false,"grammar":false},"lastScore":null},{"id":103,"title":"Lesson 103 The French test","text":"法语考试\nListen to the tape then answer this question. How long did the exam last?\n听录音,然后回答问题。  考试持续了多⻓时间?\nGARY:    How was the exam, Richard?\nRICHARD: Not too bad.I think I passed in English and Mathematics.The\nquestions were very easy.How about you, Gary?\nGARY:    The English and Maths papers weren't easy enough for me.I hope\nI haven't failed.\nRICHARD: I think I failed the French paper.I could answer sixteen of the\nquestion.They were very easy.But I couldn't answer the rest.They were too\ndifficult for me.\nGARY:    French test are awful, aren't they?\nRICHARD: I hate them.I'm sure I've got a low mark.\nGARY:    Oh, cheer up!perhaps we didn't to do badly.The guy next to me\nwrote his name at the top of the paper.\nRICHARD: Yes?\nGARY:    Then he sat there and looked at it for three hours! He didn't write\na word!","grammarPoint":"一般过去时：动词过去式，讲述过去发生的事情。\n情态动词：can/must/may 等后接动词原形，表达能力、许可或必要。\n宾语从句和间接引语：用 that/if/whether/疑问词引导从句。","words":[{"en":"exam","phonetic":"ig'zæm","pos":"n","cn":"考试"},{"en":"pass","phonetic":"pɑ:s","pos":"v","cn":"及格,通过"},{"en":"mathematics","phonetic":"ˌmæθə'mætiks","pos":"n","cn":"数学"},{"en":"question","phonetic":"'kwestʃən","pos":"n","cn":"问题"},{"en":"easy","phonetic":"' t it's too small for\nme.\nASSISTANT: What about this one?It's lovely dress.It's very smart..Short\nskirts are in fashion now.Would you like to try it?\nLADY:      All right.\nLADY:      I'm afraid this green dress it too small for me as well. It's smaller\nthan the blue one.\nLADY:      I don't like the colour either. It doesn't suit me at all. I think the\nblue dress is prettier.\nLADY:      Could you show me another blue dress? I want a dress like that\none, but it must be my size.\nASSISTANT: I'm afraid I haven't got a larger dress.This is the largest dress\nin the shop.","grammarPoint":"情态动词：can/must/may 等后接动词原形，表达能力、许可或必要。\n比较级和最高级：形容词比较级/最高级用于比较人或事物。\n宾语从句和间接引语：用 that/if/whether/疑问词引导从句。","words":[{"en":"madam","phonetic":"'mædəm","pos":"n","cn":"夫人,女士 ( 对妇女的尊称 )"},{"en":"as well","phonetic":"","pos":"","cn":"同样"},{"en":"suit","phonetic":"su:t, sju:t","pos":"v","cn":"适于"},{"en":"pretty","phonetic":"'priti","pos":"a","cn":"漂亮的"}],"grammar":[{"prompt":"语法点：情态动词：can/must/may 等后接动词原形，表达能力、许可或必要。\n仿写 3 个句子，尽量替换主语、物品或地点。","example":"You must stay in bed. / Can you help me?","answer":"","user":""},{"prompt":"把本课一个肯定句改成否定句，再改成一般疑问句。","example":"This is your handbag. -> This is not your handbag. -> Is this your handbag?","answer":"","user":""},{"prompt":"用本课单词写 2 组问答，回答要完整。","example":"Whose handbag is it? It is my handbag.","answer":"","user":""},{"prompt":"中译英：自己写一个包含本课语法点的中文句子，并翻译成英文。","example":"这是你的手提包吗？ -> Is this your handbag?","answer":"","user":""}],"review":{"words":false,"spell":false,"text":false,"grammar":false},"lastScore":null},{"id":108,"title":"Lesson 108","text":"","grammarPoint":"本课为句型操练课，重点巩固：比较级和最高级；too small / big enough。","words":[],"grammar":[{"prompt":"知识点：比较级和最高级；too small / big enough。\n仿写 5 组替换句，保持句型不变，只替换主语、物品、地点或形容词。","example":"This one is bigger than that one. / It is the most expensive model.","answer":"","user":""},{"prompt":"把 3 个肯定句分别改成否定句和一般疑问句，并写出 Yes/No 回答。","example":"This is my pen. -> This is not my pen. -> Is this your pen? Yes, it is.","answer":"","user":""},{"prompt":"用本课单词写 3 组短问答，要求至少包含一个代词、一个 be 动词或助动词。","example":"Is this your book? No, it isn't. It is my teacher's book.","answer":"","user":""},{"prompt":"中译英：围绕本课语法点写 3 个中文句子，再翻译成英文。","example":"这是一辆小汽车吗？ -> Is this a car?","answer":"","user":""},{"prompt":"错句改正：自己故意写 3 个含本课语法错误的英文句子，然后改正。","example":"Is this your books? -> Are these your books?","answer":"","user":""}],"review":{"words":false,"spell":false,"text":false,"grammar":false},"lastScore":null},{"id":109,"title":"Lesson 109 A good idea","text":"好主意\nListen to the tape then answer this question. What does Jane have with her\ncoffee?\n听录音,然后回答问题。喝咖啡时简吃了什么?\nCHARLOTTE: Shall I make some coffee,Jane?\nJANE:      That's a good idea,Charlotte.\nCHARLOTTE: It's ready.Do you want any milk?\nJANE:      Just a little, please.\nCHARLOTTE: What about some sugar?Two teaspoonfuls?\nJANE:      No, less than that.One and a half teaspoonfuls,please.That's\nenough for me.\nJANE:      That was very nice.\nCHARLOTTE: Would you like some more?\nJANE:      Yes, please.\nJANE:      I'd like a cigarette, too.May I have one?\nCHARLOTTE: Of course.I think there are a few in that box.\nJANE:      I'm afraid it's empty.\nCHARLOTTE: What a pity!\nJANE:      It doesn't matter.\nCHARLOTTE: Have a biscuit instead.Eat more and smoke less!\nJANE:      That's very good advice!","grammarPoint":"一般过去时：动词过去式，讲述过去发生的事情。\n一般将来时：will/shall 或 be going to，表达计划和将来动作。\n情态动词：can/must/may 等后接动词原形，表达能力、许可或必要。","words":[{"en":"idea","phonetic":"ai'diə","pos":"n","cn":"主意"},{"en":"teaspoonful","phonetic":"'ti:spu:nful","pos":"n","cn":"一满茶匙"},{"en":"less","phonetic":"les","pos":"a","cn":"的比较级 ) 校少的,更小的"},{"en":"pity","phonetic":"'piti","pos":"n","cn":"遗憾"},{"en":"instead","phonetic":"in'sted","pos":"ad","cn":"代替"},{"en":"advice","phonetic":"əd'vais","pos":"n","cn":"建议,忠告"}],"grammar":[{"prompt":"语法点：一般过去时：动词过去式，讲述过去发生的事情。\n仿写 3 个句子，尽量替换主语、物品或地点。","example":"I went to the shop yesterday. / Did you see him?","answer":"","u ost expensive model in the shop.It costs five\nhundred pounds.\nMR. FRITH: That's too expensive for us.We can't afford all that money.\nASSISTANT: This model's less expensive than that one.It's only three\nhundred pounds. But, of course,it's not as good as the expensive one.\nMR. FRITH: I don't like the model.The other model's more expensive, but\nit's worth the money.\nMR. FRITH: Can we buy it on instalments?\nASSISTANT: Of course.You can pay a deposit of thirty pounds, and then\nfourteen pounds a month for three years.\nMR. FRITH: Do you like it, dear?\nMRS. FRITH:I certainly do,but I don't like the price.You always want the\nbest,but we can't afford it.Sometimes you think you're a millionaire!\nMR. FRITH: Millionaires don't buy things on instalments!","grammarPoint":"情态动词：can/must/may 等后接动词原形，表达能力、许可或必要。\n比较级和最高级：形容词比较级/最高级用于比较人或事物。\n定语从句：用 who/which/that 修饰前面的名词。","words":[{"en":"model","phonetic":"'mɔdl","pos":"n","cn":"型号,式样"},{"en":"afford","phonetic":"ə'fɔ:d","pos":"v","cn":"付得起 ( 钱 )"},{"en":"deposit","phonetic":"di'pɔzit","pos":"n","cn":"预付定金"},{"en":"instalment","phonetic":"in'stɔ:lmənt","pos":"n","cn":"分期付款"},{"en":"price","phonetic":"prais","pos":"n","cn":"价格"},{"en":"millionaire","phonetic":"ˌmiljə'neə","pos":"n","cn":"百万富翁"}],"grammar":[{"prompt":"语法点：情态动词：can/must/may 等后接动词原形，表达能力、许可或必要。\n仿写 3 个句子，尽量替换主语、物品或地点。","example":"You must stay in bed. / Can you help me?","answer":"","user":""},{"prompt":"把本课一个肯定句改成否定句，再改成一般疑问句。","example":"This is your handbag. -> This is not your handbag. -> Is this your handbag?","answer":"","user":""},{"prompt":"用本课单词写 2 组问答，回答要完整。","example":"Whose handbag is it? It is my handbag.","answer":"","user":""},{"prompt":"中译英：自己写一个包含本课语法点的中文句子，并翻译成英文。","example":"这是你的手提包吗？ -> Is this your handbag?","answer":"","user":""}],"review":{"words":false,"spell":false,"text":false,"grammar":false},"lastScore":null},{"id":112,"title":"Lesson 112","text":"","grammarPoint":"本课为句型操练课，重点巩固：最高级：the most...；价格比较。","words":[],"grammar":[{"prom , knock!","text":"敲敲门!\nListen to the tape then answer this question. What does Jim have to drink?\n听录音,然后回答问题。吉姆只能喝什么饮料?\nHELEN: Isn't there anyone at home?\nJIM:   I'll knock again, Helen.Everything's very quiet.I'm sure there's no one\nat home.\nHELEN: But that's impossible.Carol and Tom invited us to lunch.Look\nthrough the window.\nHELEN: Can you see anything?\nJIM:   Nothing at all.\nHELEN: Let's try the back door.\nJIM:   Look! Everyone's in the garden.\nCAROL: Hello, Helen. Hello, Jim.\nTOM:   Everybody wants to have lunch in the garden. It's nice and warm\nout here.\nCAROL: Come and have something to drink.\nJIM:   Thanks, Carol.May I have a glass of beer please?\nCAROL: Beer?There's none left.You can have some lemonade.\nJIM:   Lemonade!\nTOM:   Don't believe her, Jim.She's only joking.Have some beer!","grammarPoint":"情态动词：can/must/may 等后接动词原形，表达能力、许可或必要。\n一般疑问句：be 动词或助动词提前，回答用 Yes/No。\n特殊疑问句：用 what/whose/which/where/when/how 提问。","words":[{"en":"anyonepron.(","phonetic":"'eniwʌn","pos":"","cn":"用于疑问句,否定式 ) 任何人"},{"en":"knock","phonetic":"nɔk","pos":"v","cn":"敲,打"},{"en":"everything","phonetic":"'evriθiŋ","pos":"pron","cn":"一切事物"},{"en":"quiet","phonetic":"'kwaiət","pos":"a","cn":"宁静的,安静的"},{"en":"impossible","phonetic":"im'pɔsəbəl","pos":"a","cn":"不可能的"},{"en":"invite","phonetic":"in'vait","pos":"v","cn":"邀请"},{"en":"anything","phonetic":"'eniθiŋ","pos":"pron","cn":"任何东⻄"},{"en":"nothing","phonetic":"'nʌθiŋ","pos":"pron","cn":"什么也没有"},{"en":"lemonade","phonetic":"ˌlemə'neid","pos":"n","cn":"柠檬水"},{"en":"joke","phonetic":"dʒəuk","pos":"v","cn":"开玩笑"}],"grammar":[{"prompt":"语法点：情态动词：can/must/may 等后接动词原形，表达能力、许可或必要。\n仿写 3 个句子，尽量替换主语、物品或地点。","example":"You must stay in bed. / Can you help me?","answer":"","user":""},{"prompt":"把本课一个肯定句改成否定句，再改成一般疑问句。","example":"This is your handbag. -> This is not your handbag. -> Is this your handbag?","answer":"","user":""},{"prompt":"用本课单词写 2 组问答，回答要完整。","example":"Whose handbag is it? It is my handbag.","answer":"","user  toilet three times\nthis morning, but I haven't had any change yet!'","grammarPoint":"一般过去时：动词过去式，讲述过去发生的事情。\n情态动词：can/must/may 等后接动词原形，表达能力、许可或必要。\nThere be 句型：There is/are 表示某处存在某物。","words":[{"en":"dining room","phonetic":"","pos":"","cn":"饭厅"},{"en":"coin","phonetic":"kɔin","pos":"n","cn":"硬币"},{"en":"mouth","phonetic":"mauθ","pos":"n","cn":"嘴"},{"en":"swallow","phonetic":"swɔləu","pos":"v","cn":"吞下"},{"en":"later","phonetic":"'leitə","pos":"ad","cn":"后来"},{"en":"toilet","phonetic":"'tɔilit","pos":"n","cn":"厕所,盥洗室"}],"grammar":[{"prompt":"语法点：一般过去时：动词过去式，讲述过去发生的事情。\n仿写 3 个句子，尽量替换主语、物品或地点。","example":"I went to the shop yesterday. / Did you see him?","answer":"","user":""},{"prompt":"把本课一个肯定句改成否定句，再改成一般疑问句。","example":"This is your handbag. -> This is not your handbag. -> Is this your handbag?","answer":"","user":""},{"prompt":"用本课单词写 2 组问答，回答要完整。","example":"Whose handbag is it? It is my handbag.","answer":"","user":""},{"prompt":"中译英：自己写一个包含本课语法点的中文句子，并翻译成英文。","example":"这是你的手提包吗？ -> Is this your handbag?","answer":"","user":""}],"review":{"words":false,"spell":false,"text":false,"grammar":false},"lastScore":null},{"id":118,"title":"Lesson 118","text":"","grammarPoint":"本课为句型操练课，重点巩固：过去完成时初步；before/after 时间关系。","words":[{"en":"ring","phonetic":"riŋ","pos":"v","cn":"响"}],"grammar":[{"prompt":"知识点：过去完成时初步；before/after 时间关系。\n仿写 5 组替换句，保持句型不变，只替换主语、物品、地点或形容词。","example":"This is my book. -> Is this your book? -> No, it isn't.","answer":"","user":""},{"prompt":"把 3 个肯定句分别改成否定句和一般疑问句，并写出 Yes/No 回答。","example":"This is my pen. -> This is not my pen. -> Is this your pen? Yes, it is.","answer":"","user":""},{"prompt":"用本课单词写 3 组短问答，要求至少包含一个代词、一个 be 动词或助动词。","example":"Is this your book? No, it isn't. It is my teacher's book.","answer":"","user":""},{"prompt":"中译英：围绕本课语法点写 3 个中文句子，再翻译成英文。","example":"这是一辆小汽车吗？ -> Is this a car?","answer":"","user":""},{"prompt":"错句改正：自己故意写 3 个含本课语法错误的英文句子，然后改正。","example":"Is this your books? -> Are these your books?","answer":"","user":""}],"review":{"words":false,"spell":false,"text":false,"grammar":false},"lastScore":null},{"id":119,"title":"Lesson 119 A true story","text":"一个真实的故事\nListen to the tape then answer this question. Who called out to the thieves in\nthe dark?\n听录音,然后回答问题。谁在暗处对窃贼喊了一声?\nDo you like stories? I want to tell you a true story. It happened to a friend\nof mine a year ago.While my friend, George, was reading in bed, two\nthieves climbed into his kitchen.After they had entered the house, they went\ninto the dining room. It was very dark, so they turned on a torch.Suddenly,\nthey heard a voice behind them. \"What's up? What's up?\" someone called.\nThe thieves dropped the torch and ran away as quickly as they\ncould.George heard the noise and came downstairs quickly.He turned on the\nlight, but he couldn't see anyone. The thieves had already gone.But\nGeorge's parrot, Henry, was still there. \"What's up, George?\" the called.\n'Nothing, Henry,' George said and smiled. 'Go back to sleep.'","grammarPoint":"一般过去时：动词过去式，讲述过去发生的事情。\n情态动词：can/must/may 等后接动词原形，表达能力、许可或必要。\n定语从句：用 who/which/that 修饰前面的名词。","words":[{"en":"story","phonetic":"'stɔ:ri","pos":"n","cn":"故事"},{"en":"happen","phonetic":"'hæpən","pos":"v","cn":"发生"},{"en":"thief","phonetic":"θi:f","pos":"n","cn":"贼"},{"en":"enter","phonetic":"'entə","pos":"v","cn":"进入"},{"en":"dark","phonetic":"dɑ:k","pos":"a","cn":"黑暗的"},{"en":"torch","phonetic":"tɔ:tʃ","pos":"n","cn":"手电筒"},{"en":"voice","phonetic":"vɔis","pos":"n","cn":"说话的 ) 声音"},{"en":"parrot","phonetic":"'pærət","pos":"n","cn":"鹦鹉"}],"grammar":[{"prompt":"语法点：一般过去时：动词过去式，讲述过去发生的事情。\n仿写 3 个句子，尽量替换主语、物品或地点。","example":"I went to the shop yesterday. / Did you see him?","answer":"","user":""},{"prompt":"把本课一个肯定句改成否定句，再改成一般疑问句。","example":"This is your handbag. -> This is not your handbag. -> Is this your handbag?","answer":"","user":""},{"prompt":"用本课单词写 2 组问答，回答要完整。","example":"Whose handbag is it? It is my handbag.","answer":"","user":""},{"prompt":"中译英：自己写一个包含本课语法点的中文句子 false},"lastScore":null},{"id":123,"title":"Lesson 123 A trip to Australia","text":"澳大利亚之行\nListen to the tape then answer this question. Who is the man with the beard?\n听录音,然后回答问题。那个⻓着络腮胡子的人是谁?\nMIKE:  Look, Scott.This is a photograph I took during my trip to Australia.\nSCOTT: Let me see it, Mike.\nSCOTT: This is a good photograph.Who are these people?\nMIKE:  They're people I met during the trip.\nMIKE:  That's the ship we travelled on.\nSCOTT: What a beautiful ship!\nSCOTT: Who's this?\nMIKE:  That's the man I told you about.Remember?\nSCOTT: Ah yes.The one who offered you a job in Australia.\nMIKE:  That's right.\nSCOTT: Who's this?\nMIKE:  Guess!\nSCOTT: It's not you, is it?\nMIKE:  That's right.\nMIKE:  I grew a beard during the trip.but I shaved it off when I came home.\nSCOTT: Why did you shave it off?\nMIKE:  My wife didn't like it!","grammarPoint":"一般过去时：动词过去式，讲述过去发生的事情。\n宾语从句和间接引语：用 that/if/whether/疑问词引导从句。\n定语从句：用 who/which/that 修饰前面的名词。","words":[{"en":"during","phonetic":"'djuəriŋ","pos":"prep","cn":"在 ... 期间"},{"en":"trip","phonetic":"trip","pos":"n","cn":"旅行"},{"en":"travel","phonetic":"'trævəl","pos":"v","cn":"旅行"},{"en":"offer","phonetic":"'ɔfə","pos":"v","cn":"提供"},{"en":"job","phonetic":"dʒɔb","pos":"n","cn":"工作"},{"en":"guess","phonetic":"ges","pos":"v","cn":"猜"},{"en":"grow","phonetic":"grəu","pos":"v","cn":"让 ... 生⻓"},{"en":"beard","phonetic":"biəd","pos":"n","cn":"下巴上的 ) 胡子,络腮胡子"}],"grammar":[{"prompt":"语法点：一般过去时：动词过去式，讲述过去发生的事情。\n仿写 3 个句子，尽量替换主语、物品或地点。","example":"I went to the shop yesterday. / Did you see him?","answer":"","user":""},{"prompt":"把本课一个肯定句改成否定句，再改成一般疑问句。","example":"This is your handbag. -> This is not your handbag. -> Is this your handbag?","answer":"","user":""},{"prompt":"用本课单词写 2 组问答，回答要完整。","example":"Whose handbag is it? It is my handbag.","answer":"","user":""},{"prompt":"中译英：自己写一个包含本课语法点的中文句子，并翻译成英文。","example":"这是你的手提包吗？ -> Is this your handbag?","answer":"","user":""}],"review":{"words":false,"spell":false,"text":f  Can you recognize that woman,Liz?\nLIZ:  I think I can, Kate.It must be Karen Marsh,the actress.\nKATE: I though so.Who's that beside her?\nLIZ:  That must be Conrad Reeves.\nKATE: Conrad Reeves, the actor?It's can't be.Let me have another look.I\nthink you're right!Isn't he her third husband?\nLIZ:  No. He must be her fourth or fifth.\nKATE: Doesn't Karen Marsh look old!\nLIZ:  She does, doesn't she!I read she's twenty-nine,but she must be at least\nforty.\nKATE: I'm sure she is.\nLIZ:  She was a famous actress when I was still at school.\nKATE: That was a long time ago,wasn't it?\nLIZ:  Not that long ago!I'm not more than twenty-nine myself.","grammarPoint":"一般过去时：动词过去式，讲述过去发生的事情。\n情态动词：can/must/may 等后接动词原形，表达能力、许可或必要。\n比较级和最高级：形容词比较级/最高级用于比较人或事物。","words":[{"en":"famous","phonetic":"'feiməs","pos":"a","cn":"著名的"},{"en":"actress","phonetic":"'æktris","pos":"n","cn":"女演员"},{"en":"at least","phonetic":"","pos":"","cn":"至少"},{"en":"actor","phonetic":"'æktə","pos":"n","cn":"男演员"},{"en":"read","phonetic":"ri:d","pos":"v","cn":"通过阅读得知"}],"grammar":[{"prompt":"语法点：一般过去时：动词过去式，讲述过去发生的事情。\n仿写 3 个句子，尽量替换主语、物品或地点。","example":"I went to the shop yesterday. / Did you see him?","answer":"","user":""},{"prompt":"把本课一个肯定句改成否定句，再改成一般疑问句。","example":"This is your handbag. -> This is not your handbag. -> Is this your handbag?","answer":"","user":""},{"prompt":"用本课单词写 2 组问答，回答要完整。","example":"Whose handbag is it? It is my handbag.","answer":"","user":""},{"prompt":"中译英：自己写一个包含本课语法点的中文句子，并翻译成英文。","example":"这是你的手提包吗？ -> Is this your handbag?","answer":"","user":""}],"review":{"words":false,"spell":false,"text":false,"grammar":false},"lastScore":null},{"id":128,"title":"Lesson 128","text":"","grammarPoint":"本课为句型操练课，重点巩固：must/can't 表推测；人物身份判断。","words":[],"grammar":[{"prompt":"知识点：must/can't 表推测；人物身份判断。\n仿写 5 组替换句，保持句型不变，只替换主语、物品、地点或形容词。","example":"This is my book. -> Is this your book? -> No, it isn't.","answer":"","user":""},{"prompt":"把 3 个肯定句分别改成否定句和一般疑问句，并写出 Yes/No 回答。","example ut\ndeciding on a holiday?\n听录音,然后回答问题。决定如何度假有什么为难的地方?\nMARTIN: Where are you going to spend your holidays this year,Gary?\nGARY:   We may go abroad.I'm not sure.My wife wants go to Egypt. I'd\nlike to there, too.We can't make up our minds.\nMARTIN: Will you travel by sea or air?\nGARY:   We may travel by sea.\nMARTIN: It's cheaper, isn't it?\nGARY:   It may be cheaper.but it takes a long time.\nMARTIN: I'm sure you'll enjoy yourselves.\nGART:   Don't be so sure.We might not go anywhere.My wife always\nworries too much.Who's going to look after the dog?Who's going to look\nafter the house?Who's going to look after the garden? We have this problem\nevery year.in the end, we stay at home and look after everything!","grammarPoint":"一般将来时：will/shall 或 be going to，表达计划和将来动作。\n情态动词：can/must/may 等后接动词原形，表达能力、许可或必要。\n特殊疑问句：用 what/whose/which/where/when/how 提问。","words":[{"en":"Egypt","phonetic":"'i:dʒipt","pos":"n","cn":"埃及"},{"en":"abroad","phonetic":"ə'brɔ:d","pos":"ad","cn":"国外"},{"en":"worry","phonetic":"'wʌri","pos":"v","cn":"担忧"}],"grammar":[{"prompt":"语法点：一般将来时：will/shall 或 be going to，表达计划和将来动作。\n仿写 3 个句子，尽量替换主语、物品或地点。","example":"I am going to clean the room. / We will arrive tomorrow.","answer":"","user":""},{"prompt":"把本课一个肯定句改成否定句，再改成一般疑问句。","example":"This is your handbag. -> This is not your handbag. -> Is this your handbag?","answer":"","user":""},{"prompt":"用本课单词写 2 组问答，回答要完整。","example":"Whose handbag is it? It is my handbag.","answer":"","user":""},{"prompt":"中译英：自己写一个包含本课语法点的中文句子，并翻译成英文。","example":"这是你的手提包吗？ -> Is this your handbag?","answer":"","user":""}],"review":{"words":false,"spell":false,"text":false,"grammar":false},"lastScore":null},{"id":132,"title":"Lesson 132","text":"","grammarPoint":"本课为句型操练课，重点巩固：宾语从句：I am sure / I wonder...。","words":[],"grammar":[{"prompt":"知识点：宾语从句：I am sure / I wonder...。\n仿写 5 组替换句，保持句型不变，只替换主语、物品、地点或形容词。","example":"He says that he is tired. / I don't know when he will finish.","answer":"","user":""},{"prompt":"把 3 个肯定句分别改成否定句和一般疑问句，并写出 Yes/No 回答。","example":"This is my pen. -> This is not my pen. -> Is this your pen? Yes, it is.","answer":"","user":""},{"prompt":"用本课单词写 3 组短问答，要求至少包含一个代词、一个 be 动词或助动词。","example":"Is this your book? No, it isn't. It is my teacher's book.","answer":"","user":""},{"prompt":"中译英：围绕本课语法点写 3 个中文句子，再翻译成英文。","example":"这是一辆小汽车吗？ -> Is this a car?","answer":"","user":""},{"prompt":"错句改正：自己故意写 3 个含本课语法错误的英文句子，然后改正。","example":"Is this your books? -> Are these your books?","answer":"","user":""}],"review":{"words":false,"spell":false,"text":false,"grammar":false},"lastScore":null},{"id":133,"title":"Lesson 133 Sensational news!","text":"爆炸性新闻!\nListen to the tape then answer this question. What reason did Karen Marsh\ngive for wanting to retire?\n听录音,然后回答问题。卡伦 . ⻢什说她为什么想要退休?\nREPORTER:   Have you just made a new film, Miss Marsh?\nMISS MARSH: Yes, I have.\nREPORTER:   Are you going to make a another?\nMISS MARSH: No, I'm not.I'm going to retire.I feel very tired.I don't want\nto make another film for a long time.\nKATE:       Let's buy a newspaper, Liz.Listen to this!\n'Karen Marsh: SensationalNews! By our reporter,Alan Jones. Karen Marsh\narrived at London Airport today. She was wearing a blue dress and a mink\ncoat.She told me she had just made a new film.she said she was not going to\nmake another.She said she was going to retire.She told reporters she felt\nvery tired and didn't want to make another film for a long time.'\nLIZ:        I wonder why!","grammarPoint":"现在完成时：have/has + 过去分词，表达已经发生并影响现在的动作。\n一般过去时：动词过去式，讲述过去发生的事情。\n一般将来时：will/shall 或 be going to，表达计划和将来动作。","words":[{"en":"reporter","phonetic":"ri'pɔ:tə","pos":"n","cn":"记者"},{"en":"sensational","phonetic":"sen'seiʃənəl","pos":"a","cn":"爆炸性的,耸人听闻的"},{"en":"mink coat","phonetic":"'miŋk-kəut","pos":"","cn":"貂皮大衣"}],"grammar":[{"prompt":"语法点：现在完成时：have/has + 过去分词，表达已经发生并影响现在的动作。\n仿写 3 个句子，尽量替换主语、物品或地点。","example":"I have just finished my homework. / Have you ever been to Paris?","answer":"","user":""},{"prompt":"把本课一个肯定句改成否定句，再改成一般疑问句。","example":"This is your handbag. -> This is not your handbag. -> Is this your handbag?","answer":"","user":""},{"prompt":"用本课单词写 2 组问答，回答要完整。","example":"Whose handbag is it? It is my handbag.","answer":"","user":""},{"prompt":"中译英：自己写一个包含本课语法点的中文句子，并翻译成英文。","example":"这是你的手提包吗？ -> Is this your handbag?","answer":"","user":""}],"review":{"words":false,"spell":false,"text":false,"grammar":false},"lastScore":null},{"id":134,"title":"Lesson 134","text":"","grammarPoint":"本课为句型操练课，重点巩固：直接引语和间接引语；新闻转述。","words":[],"grammar":[{"prompt":"知识点：直接引语和间接引语；新闻转述。\n仿写 5 组替换句，保持句型不变，只替换主语、物品、地点或形容词。","example":"This is my book. -> Is this your book? -> No, it isn't.","answer":"","user":""},{"prompt":"把 3 个肯定句分别改成否定句和一般疑问句，并写出 Yes/No 回答。","example":"This is my pen. -> This is not my pen. -> Is this your pen? Yes, it is.","answer":"","user":""},{"prompt":"用本课单词写 3 组短问答，要求至少包含一个代词、一个 be 动词或助动词。","example":"Is this your book? No, it isn't. It is my teacher's book.","answer":"","user":""},{"prompt":"中译英：围绕本课语法点写 3 个中文句子，再翻译成英文。","example":"这是一辆小汽车吗？ -> Is this a car?","answer":"","user":""},{"prompt":"错句改正：自己故意写 3 个含本课语法错误的英文句子，然后改正。","example":"Is this your books? -> Are these your books?","answer":"","user":""}],"review":{"words":false,"spell":false,"text":false,"grammar":false},"lastScore":null},{"id":135,"title":"Lesson 135 The latest report","text":"最新消息\nListen to the tape then answer this question. Is Karen Marsh going to retire,\ndo you think?\n听录音,然后回答问题。你认为卡伦 . ⻢什会退休吗?\nREPORTER:   Are you really going to retire, miss Marsh?MISS MARSH: I\nmay.I can't make up my mind.I will have to ask my future husband.He\nwon't let me make another film.\nREPORTER:   Your future husband,Miss Marsh?\nMISS MARSH: Yes. Let me introduce him to you. His name is\nCarlos.We're going to get married next week.\nKATE:       Look, Liz! Here's another report about Karen Marsh.Listen:\n'Karen Marsh: The latest. At her London Hotel today Miss Marsh told\nreporters she might retire.She said she couldn't make up her mind. She said\nshe would have to ask her future husband. She said her future husband\nwould not let her make another film.Then she introduced us to Carlos and\ntold us they would get married next week'.\nLIZ:        That's sensational news,isn't it, Kate?\nKATE:       It certainly is.He'll be her sixth husband!","grammarPoint":"一般过去时：动词过去式，讲述过去发生的事情。\n一般将来时：will/shall 或 be going to，表达计划和将来动作。\n情态动词：can/must/may 等后接动词原形，表达能力、许可或必要。","words":[{"en":"future","phonetic":"'fju:tʃə","pos":"n","cn":"未来的"},{"en":"get married","phonetic":"","pos":"","cn":"结婚"},{"en":"hotel","phonetic":"həu'tel","pos":"n","cn":"饭店"},{"en":"latest","phonetic":"'leitist","pos":"a","cn":"最新的"},{"en":"introduce","phonetic":"'intrə'dju:s","pos":"v","cn":"介绍"}],"grammar":[{"prompt":"语法点：一般过去时：动词过去式，讲述过去发生的事情。\n仿写 3 个句子，尽量替换主语、物品或地点。","example":"I went to the shop yesterday. / Did you see him?","answer":"","user":""},{"prompt":"把本课一个肯定句改成否定句，再改成一般疑问句。","example":"This is your handbag. -> This is not your handbag. -> Is this your handbag?","answer":"","user":""},{"prompt":"用本课单词写 2 组问答，回答要完整。","example":"Whose handbag is it? It is my handbag.","answer":"","user":""},{"prompt":"中译英：自己写一个包含本课语法点的中文句子，并翻译成英文。","example":"这是你的手提包吗？ -> Is this your handbag?","answer":"","user":""}],"review":{"words":false,"spell":false,"text":false,"grammar":false},"lastScore":null},{"id":136,"title":"Lesson 136","text":"","grammarPoint":"本课为句型操练课，重点巩固：间接引语中的时态变化；report/say/tell。","words":[],"grammar":[{"prompt":"知识点：间接引语中的时态变化；report/say/tell。\n仿写 5 组替换句，保持句型不变，只替换主语、物品、地点或形容词。","example":"This is my book. -> Is this your book? -> No, it isn't.","answer":"","user":""},{"prompt":"把 3 个肯定句分别改成否定句和一般疑问句，并写出 Yes/No 回答。","example":"This is my pen. -> This is not my pen. -> Is this your pen? Yes, it is.","answer":"","user":""},{"prompt":"用本课单词写 3 组短问答，要求至少包含一个代词、一个 be 动词或助动词。","example":"Is this your book? No, it isn't. It is my teacher's book.","answer":"","user":""},{"prompt":"中译英：围绕本课语法点写 3 个中文句子，再翻译成英文。","example":"这是一辆小汽车吗？ -> Is this a car?","answer":"","user":""},{"prompt":"错句改正：自己故意写 3 个含本课语法错误的英文句子，然后改正。","example":"Is this your books? -> Are these your books?","answer":"","user":""}],"review":{"words":false,"spell":false,"text":false,"grammar":false},"lastScore":null},{"id":137,"title":"Lesson 137 A pleasant dream","text":"美好的梦\nListen to the tape then answer this question. What would Julie like to do, if\nshe had the money?\n听录音,然后回答问题。如果朱莉有那笔钱,她想做什么呢?\nJULIE: Are you doing the football pools, Brain?\nBRIAN: Yes, I've nearly finished, Julie.Julie. I'm sure we'll win something\nthis week.\nJULIE: You always say that,but we never win anything!What will you do if\nyou win a lot of money?\nBRIAN: If I win a lot of money I'll buy you a mink coat.\nJULIE: I don't want a mink coat!I want to see the world.\nBRIAN: All right.If we win a lot of money we'll travel round the world and\nwe'll stay at the best hotels. Then we'll return home and buy a big house in\nthe country. We'll have a beautiful garden and ...\nJULIE: But if we spend all that money we'll be poor again.What'll we do\nthen?\nBRIAN: If we spend all the money we'll try and win the football pools\nagain.\nJULIE: It's a pleasant dream but everything depends on 'if'!","grammarPoint":"一般过去时：动词过去式，讲述过去发生的事情。\n一般将来时：will/shall 或 be going to，表达计划和将来动作。\n比较级和最高级：形容词比较级/最高级用于比较人或事物。","words":[{"en":"football","phonetic":"'futbɔ:l","pos":"n","cn":"足球"},{"en":"pool","phonetic":"pu:l","pos":"n","cn":"赌注"},{"en":"win","phonetic":"win","pos":"v","cn":"赢"},{"en":"world","phonetic":"wə:ld","pos":"n","cn":"世界"},{"en":"poor","phonetic":"puə","pos":"a","cn":"贫穷的"},{"en":"depend","phonetic":"di'pend","pos":"v","cn":"依靠 (on)"}],"grammar":[{"prompt":"语法点：一般过去时：动词过去式，讲述过去发生的事情。\n仿写 3 个句子，尽量替换主语、物品或地点。","example":"I went to the shop yesterday. / Did you see him?","answer":"","user":""},{"prompt":"把本课一个肯定句改成否定句，再改成一般疑问句。","example":"This is your handbag. -> This is not your handbag. -> Is this your handbag?","answer":"","user":""},{"prompt":"用本课单词写 2 组问答，回答要完整。","example":"Whose handbag is it? It is my handbag.","answer":"","user":""},{"prompt":"中译英：自己写一个包含本课语法点的中文句子，并翻译成英文。","example":"这是你的手提包吗？ -> Is this your handbag?","answer":"","user":""}],"review":{"words":false,"spell":false,"text":false,"grammar":false},"lastScore":null},{"id":138,"title":"Lesson 138","text":"","grammarPoint":"本课为句型操练课，重点巩固：条件句初步：if 引导条件；梦想和愿望。","words":[],"grammar":[{"prompt":"知识点：条件句初步：if 引导条件；梦想和愿望。\n仿写 5 组替换句，保持句型不变，只替换主语、物品、地点或形容词。","example":"This is my book. -> Is this your book? -> No, it isn't.","answer":"","user":""},{"prompt":"把 3 个肯定句分别改成否定句和一般疑问句，并写出 Yes/No 回答。","example":"This is my pen. -> This is not my pen. -> Is this your pen? Yes, it is.","answer":"","user":""},{"prompt":"用本课单词写 3 组短问答，要求至少包含一个代词、一个 be 动词或助动词。","example":"Is this your book? No, it isn't. It is my teacher's book.","answer":"","user":""},{"prompt":"中译英：围绕本课语法点写 3 个中文句子，再翻译成英文。","example":"这是一辆小汽车吗？ -> Is this a car?","answer":"","user":""},{"prompt":"错句改正：自己故意写 3 个含本课语法错误的英文句子，然后改正。","example":"Is this your books? -> Are these your books?","answer":"","user":""}],"review":{"words":false,"spell":false,"text":false,"grammar":false},"lastScore":null},{"id":139,"title":"Lesson 139 Is that you, John?","text":"是你吗,约翰?\nListen to the tape then answer this question. Which John Smith does\nGraham Turner think he is talking to?\n听录音,然后回答问题。格雷厄姆 . 特纳以为他在和哪一个约翰 . 史密斯\n通话?\nGRAHAM TURNER: Is that you, John?\nJOHN SMITH:    Yes, speaking.\nGRAHAM TURNER: Tell Mary we'll be late for dinner this evening.\nJOHN SMITH:    I'm afraid I don't understand.\nGRAHAM TURNER: Hasn't Mary told you?She invited Charlotte and me\nto dinner this evening. I said I would be at your house at six o'clock, but the\nboss want me to do some extra work. I'll have to stay at the office. I don't\nknow when I'll finish.Oh, and by the way,my wife wants to know if Mary\nneeds any help.\nJOHN SMITH:    I don't know what you're talking about.\nGRAHAM TURNER: That is John Smith,isn't it?\nJOHN SMITH:    Yes, I'm John Smith.\nGRAHAM TURNER: You are John Smith,the engineer,aren't you?\nJOHN SMITH:    That's right.\nGRAHAM TURNER: You work for the Overseas Engineering Company,\ndon't you?\nJOHN SMITH:    No, I don't I'm John Smith the telephone engineer and I'm\nrepairing your telephone line.","grammarPoint":"现在进行时：be + doing，询问或描述正在发生的动作。\n一般过去时：动词过去式，讲述过去发生的事情。\n祈使句：用动词原形发出请求、命令或提醒。","words":[{"en":"extra","phonetic":"'ekstrə","pos":"a","cn":"额外的"},{"en":"engineer","phonetic":"ˌendʒi'niə","pos":"n","cn":"工程师"},{"en":"overseas","phonetic":"ˌəuvə'si:z","pos":"a","cn":"海外的,国外的"},{"en":"engineering","phonetic":"ˌendʒi'niəriŋ","pos":"n","cn":"工程"},{"en":"company","phonetic":"'kʌmpəni","pos":"n","cn":"公司"},{"en":"line","phonetic":"lain","pos":"n","cn":"线路"}],"grammar":[{"prompt":"语法点：现在进行时：be + doing，询问或描述正在发生的动作。\n仿写 3 个句子，尽量替换主语、物品或地点。","example":"She is reading a book. / What are they doing?","answer":"","user":""},{"prompt":"把本课一个肯定句改成否定句，再改成一般疑问句。","example":"This is your handbag. -> This is not your handbag. -> Is this your handbag?","answer":"","user":""},{"prompt":"用本课单词写 2 组问答，回答要完整。","example":"Whose handbag is it? It is my handbag.","answer":"","user":""},{"prompt":"中译英：自己写一个包含本课语法点的中文句子，并翻译成英文。","example":"这是你的手提包吗？ -> Is this your handbag?","answer":"","user":""}],"review":{"words":false,"spell":false,"text":false,"grammar":false},"lastScore":null},{"id":140,"title":"Lesson 140","text":"","grammarPoint":"本课为句型操练课，重点巩固：电话用语；反意疑问句初步。","words":[],"grammar":[{"prompt":"知识点：电话用语；反意疑问句初步。\n仿写 5 组替换句，保持句型不变，只替换主语、物品、地点或形容词。","example":"This is my book. -> Is this your book? -> No, it isn't.","answer":"","user":""},{"prompt":"把 3 个肯定句分别改成否定句和一般疑问句，并写出 Yes/No 回答。","example":"This is my pen. -> This is not my pen. -> Is this your pen? Yes, it is.","answer":"","user":""},{"prompt":"用本课单词写 3 组短问答，要求至少包含一个代词、一个 be 动词或助动词。","example":"Is this your book? No, it isn't. It is my teacher's book.","answer":"","user":""},{"prompt":"中译英：围绕本课语法点写 3 个中文句子，再翻译成英文。","example":"这是一辆小汽车吗？ -> Is this a car?","answer":"","user":""},{"prompt":"错句改正：自己故意写 3 个含本课语法错误的英文句子，然后改正。","example":"Is this your books? -> Are these your books?","answer":"","user":""}],"review":{"words":false,"spell":false,"text":false,"grammar":false},"lastScore":null},{"id":141,"title":"Lesson 141 Sally's first train ride","text":"萨莉第一交乘火⻋旅行\nListen to the tape then answer this question. Why was the mother\nembarrassed?\n听录音,然后回答问题。为什么母亲感到尴尬?\nLast week, my four-year-old daughter, Sally, was invited to a children's\nparty. I decided to take her by train. Sally was very excited because she had\nnever travelled on a train before. She sat near the window and asked\nquestions about everything she saw. Suddenly, a middle-age lady got on the\ntrain and sat opposite Sally. 'Hello, little girl,' she said. Sally did not answer,\nbut looked at her curiously. The lady was dressed in a blue coat and a large,\nfunny hat. After the train had left the station, the lady opened her handbag\nand took to her power compact. She then began to make up her face. 'Why\nare you doing that?' Sally asked. 'To make myself beautiful,' the lady\nanswered. She put away her compact and smiled kindly. 'But you are still\nugly,' Sally said. Sally was amused, but I was very embarrassed!","grammarPoint":"一般过去时：动词过去式，讲述过去发生的事情。\n宾语从句和间接引语：用 that/if/whether/疑问词引导从句。\n物主代词和指示代词：this/that/these/those 与 my/your/his/her 等。","words":[{"en":"excited","phonetic":"ik'saitid","pos":"a","cn":"兴奋的"},{"en":"get on","phonetic":"","pos":"","cn":"登上"},{"en":"middle-aged","phonetic":"'midl'eidʒid","pos":"a","cn":"中年的"},{"en":"opposite","phonetic":"'ɔpəzit","pos":"prep","cn":"在 ... 对面"},{"en":"curiously","phonetic":"'kjuəriəsli","pos":"ad","cn":"好奇地"},{"en":"funny","phonetic":"'fʌni","pos":"a","cn":"可笑的,滑稽的"},{"en":"powder","phonetic":"'paudə","pos":"n","cn":"香粉"},{"en":"compact","phonetic":"'kɔmpækt","pos":"n","cn":"带镜的化妆盒"},{"en":"kindly","phonetic":"'kaindli","pos"
